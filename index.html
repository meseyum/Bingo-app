<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Bingo 2026</title>
    <!-- የቴሌግራም ዌብ አፕ ዋና ስክሪፕት (ከፓይተን ጋር የሚያገናኘው ይህ ነው!) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            text-align: center;
            direction: ltr;
        }
        .header-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .stat-box {
            background: #161b26;
            padding: 8px 2px;
            border-radius: 6px;
            border: 1px solid #232d3f;
        }
        .stat-box span {
            display: block;
            font-size: 10px;
            color: #8a99ad;
            margin-bottom: 2px;
        }
        .stat-box strong {
            font-size: 12px;
            color: #00ffcc;
        }
        .audio-banner {
            background: #c0392b;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            max-width: 100%;
            margin: 0 auto 20px auto;
            background: #161b26;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .cell {
            background: #d35400;
            color: white;
            font-weight: bold;
            font-size: 13px;
            padding: 10px 0;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            border: 1px solid #a04000;
        }
        .cell.selected {
            background: #f1c40f !important;
            color: #000000 !important;
            box-shadow: 0 0 8px #f1c40f;
            transform: scale(1.05);
        }
        .submit-btn {
            background: #2ecc71;
            color: white;
            border: none;
            width: 100%;
            padding: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-top: 10px;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <!-- የላይኛው መረጃ ሰሌዳ -->
    <div class="header-container">
        <div class="stat-box">
            <span>WALLET</span>
            <strong id="wallet-bal">5000 ብር</strong>
        </div>
        <div class="stat-box">
            <span>PLAYERS</span>
            <strong id="total-players">0</strong>
        </div>
        <div class="stat-box">
            <span>ፈራሽ</span>
            <strong id="ferash-pool">0 ብር</strong>
        </div>
        <div class="stat-box">
            <span>ROUND</span>
            <strong id="round-status" style="font-size:9px; color:#f1c40f;">በቂ ተጫዋች...</strong>
        </div>
    </div>

    <!-- የድምፅ ማስታወቂያ መስመር -->
    <div class="audio-banner">
        📢 የአማርኛ ድምፅ ለመስማት ይጫኑ!
    </div>

    <h4 style="color: #f39c12; margin: 5px 0;">🎫 የካርድ ቁጥር ይምረጡ (1-100)</h4>
    <p style="font-size: 11px; color:#8a99ad; margin: 0 0 10px 0;">ማሳሰቢያ፦ ለአንድ ቁጥር 10 ብር ያስከፍላል።</p>

    <!-- የቢንጎ ቁጥሮች ሰሌዳ (1-100) -->
    <div class="grid-container" id="bingo-grid"></div>

    <!-- 🌟 ዋናው ማረጋገጫ ቁልፍ -->
    <button class="submit-btn" id="confirm-btn">ምርጫዬን አረጋግጣለሁ</button>

    <script>
        // የቴሌግራም ዌብ አፕሊኬሽን ማስጀመር
        const tg = window.Telegram.WebApp;
        tg.expand(); // ሙሉ ስክሪን እንዲሆን

        // ከቦቱ (Python) በሊንክ የተላኩትን መረጃዎች ማንበቢያ
        const urlParams = new URLSearchParams(window.location.search);
        const balance = urlParams.get('balance') || '5000';
        const players = urlParams.get('players') || '0';
        const ferash = urlParams.get('ferash') || '0';
        const status = urlParams.get('status') || 'በቂ ተጫዋች እየተጠባበቀ ነው...';

        // መረጃዎቹን በዲዛይኑ ላይ መተካት
        document.getElementById('wallet-bal').innerText = balance + " ብር";
        document.getElementById('total-players').innerText = players;
        document.getElementById('ferash-pool').innerText = ferash + " ብር";
        document.getElementById('round-status').innerText = status;

        const grid = document.getElementById('bingo-grid');
        const markedNumbers = [];

        // ከ 1 እስከ 100 ቁጥሮችን በሰሌዳው ላይ መፍጠር
        for (let i = 1; i <= 100; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            
            cell.addEventListener('click', () => {
                if (cell.classList.contains('selected')) {
                    cell.classList.remove('selected');
                    const index = markedNumbers.indexOf(i);
                    if (index > -1) markedNumbers.splice(index, 1);
                } else {
                    cell.classList.add('selected');
                    markedNumbers.push(i);
                }
            });
            grid.appendChild(cell);
        }

        // 🌟 "ምርጫዬን አረጋግጣለሁ" ሲጫን ዳታውን ወደ ቴሌግራም ቦት (Python) መላኪያ 🌟
        document.getElementById('confirm-btn').addEventListener('click', () => {
            if (markedNumbers.length === 0) {
                alert("እባክዎ መጀመሪያ ቢያንስ አንድ ቁጥር ይምረጡ!");
                return;
            }

            // ለቦቱ የሚላከው የተመረጡ ቁጥሮች መረጃ
            const gameData = {
                marked_numbers: markedNumbers
            };

            // 🚀 ይህንን መረጃ ወደ ፓይተን ቦቱ ይልካል፣ ከዚያ ዌብ አፑን ይዘጋዋል!
            tg.sendData(JSON.stringify(gameData));
            tg.close();
        });
    </script>
</body>
</html>
