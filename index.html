<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dil Bingo Play Screen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1530;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 70px; /* ለግርጌ ሜኑ ቦታ መተው */
        }
        /* የላይኛው ረድፍ ቁልፎች */
        .top-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .nav-btn {
            background: #2e264f;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        /* የዳታ ማሳያ ሳጥኖች */
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #231b42;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .stat-box span {
            display: block;
            color: #897fa6;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-box div {
            font-size: 14px;
            font-weight: bold;
        }
        .timer-highlight {
            color: #ffcc00;
            font-size: 16px !important;
        }

        /* የቢንጎ ቁጥሮች ዋና ሰሌዳ */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            background: #231b42;
            padding: 12px;
            border-radius: 12px;
        }
        .num-cell {
            background: #2e264f;
            border-radius: 6px;
            padding: 10px 0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: #c9c1e6;
            transition: background 0.3s;
        }
        /* በፎቶው ላይ እንዳለው የወጡ ቁጥሮች ቀይ/ብርቱካንማ ይሆናሉ */
        .num-cell.called {
            background: #d84b16;
            color: #ffffff;
        }

        /* ከታች የሚታየው ዋናው የሜኑ አሞሌ (Bottom Navigation) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #150f26;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2e264f;
        }
        .menu-item {
            text-align: center;
            color: #897fa6;
            font-size: 11px;
            text-decoration: none;
            cursor: pointer;
            flex: 1;
        }
        .menu-item.active {
            color: #00ffcc;
        }
        .menu-item i {
            display: block;
            font-size: 18px;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

    <!-- የላይኛው አሰሳ -->
    <div class="top-nav">
        <button class="nav-btn" onclick="Telegram.WebApp.close()">⬅ Back</button>
        <button class="nav-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>

    <!-- የዳታዎች ሰሌዳ -->
    <div class="stats-row">
        <div class="stat-box"><span>Main Wallet</span><div id="main-wallet">0</div></div>
        <div class="stat-box"><span>Play Wallet</span><div id="play-wallet">0</div></div>
        <div class="stat-box"><span>Stake</span><div>10</div></div>
        <div class="stat-box"><span>Time Left</span><div id="timer" class="timer-highlight">35 s</div></div>
    </div>

    <!-- የቁጥሮች ማሳያ ሰሌዳ (1-88 ወይም እስከ 100 መደርደር ይቻላል) -->
    <div class="numbers-grid" id="bingo-board"></div>

    <!-- የፎቶው የታችኛው ሜኑ (Bottom Navigation) -->
    <div class="bottom-nav">
        <div class="menu-item active">🎮<br>GAME</div>
        <div class="menu-item">🏆<br>SCORES</div>
        <div class="menu-item">🕒<br>HISTORY</div>
        <div class="menu-item">💼<br>WALLET</div>
        <div class="menu-item">👤<br>PROFILE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1-88 ቁጥሮችን በሰሌዳው ላይ መደርደር
        const board = document.getElementById('bingo-board');
        for (let i = 1; i <= 88; i++) {
            board.innerHTML += `<div class="num-cell" id="cell-${i}">${i}</div>`;
        }

        // ከቦቱ የመጡ የቀጥታ መረጃዎችን ማንበብ
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('main-wallet').innerText = urlParams.get('balance') || "0";
        
        // የሰከንድ ቆጣሪ አሰራር (ከ 35 ሰከንድ ጀምሮ ወደ ታች ይቆጥራል)
        let timeLeft = 35;
        const timerElement = document.getElementById('timer');
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft + " s";
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerText = "Next Round";
            }
        }, 1000);

        // በፓይተን የወጡትን ቁጥሮች ተቀብሎ ቀይ ማድረጊያ ህግ
        const calledBallsStr = urlParams.get('called_balls') || "";
        if (calledBallsStr) {
            const balls = calledBallsStr.split(',').map(Number);
            balls.forEach(ball => {
                const cell = document.getElementById(`cell-${ball}`);
                if (cell) {
                    cell.classList.add('called'); // ቀይ ያደርገዋል
                }
            });
        }
    </script>
</body>
</html>
