<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቢንጎ ጨዋታ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; }
        .selected { background-color: yellow; }
    </style>
</head>
<body>
    <h1>ቢንጎ ይምረጡ</h1>
    <div class="grid" id="grid"></div>
    <br>
    <button id="confirm-button" style="background-color: green; color: white;">ምርጫዬን አረጋግጣለሁ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        let selectedNumbers = [];
        const grid = document.getElementById('grid');

        // የቢንጎ ቁጥሮችን መፍጠር
        for (let i = 1; i <= 25; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            btn.onclick = () => {
                if (selectedNumbers.includes(i)) {
                    selectedNumbers = selectedNumbers.filter(n => n !== i);
                    btn.classList.remove('selected');
                } else {
                    selectedNumbers.push(i);
                    btn.classList.add('selected');
                }
            };
            grid.appendChild(btn);
        }

        // 🔴 ዳታውን ለቦቱ መላኪያ
        document.getElementById("confirm-button").addEventListener("click", () => {
            const botToken = "8836060939:AAFoUFgghWNxK-Hmrc9Q5jo4aPsSvxd4nIM";
            const userId = tg.initDataUnsafe?.user?.id;

            if (!userId) { alert("ID አልተገኘም!"); return; }

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: userId,
                    text: `🎰 BINGO_DATA:${JSON.stringify({ marked_numbers: selectedNumbers })}`
                })
            }).then(() => {
                tg.close(); // ጨዋታው ሲላክ ይዘጋል
            });
        });
    </script>
</body>
</html>
