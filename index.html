<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #171131; color: white; font-family: sans-serif; padding: 12px; }
        
        .header-stats { display: flex; justify-content: space-between; background: #1e163d; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .stat-val { color: #00ffcc; font-weight: bold; display: block; margin-top: 4px; }

        .banner { background: rgba(0, 255, 204, 0.1); border: 1px dashed #00ffcc; padding: 8px; border-radius: 6px; font-size: 11px; text-align: center; color: #00ffcc; margin-bottom: 12px; }

        /* 5x5 የካርቴላ ሰሌዳ */
        .matrix-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
        .grid-cell { background: white; color: #171131; font-weight: bold; font-size: 16px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); position: relative; }
        .grid-cell.star { background: #ffcc00; color: #171131; font-size: 22px; }
        .grid-cell.hit { background: #00ffcc !important; color: white !important; }

        /* 🏆 የቢንጎ አሸናፊ ፖፕአፕ ሰሌዳ */
        .winner-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(23, 17, 49, 0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .crown { font-size: 60px; margin-bottom: 10px; animation: bounce 1s infinite alternate; }
        .win-title { font-size: 32px; font-weight: bold; color: #ffcc00; margin-bottom: 5px; }
        .win-name { font-size: 20px; margin-bottom: 20px; color: white; }

        .btn-register { width: 100%; background: #00ffcc; color: #171131; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-register:disabled { background: #443c68; color: #7f78a7; }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="header-stats">
        <div>ዋና ሂሳብ<span class="stat-val" id="wallet">100.00 ብር</span></div>
        <div>ቀሪ ሰከንድ<span class="stat-val" id="timer">30 s</span></div>
        <div>ሁኔታ<span class="stat-val" id="status" style="color:#ff3366;">የቀጥታ ጨዋታ!</span></div>
    </div>

    <div class="banner">💡 እባክዎ "ካርቴላ አውጣ" የሚለውን በመንካት የ 5x5 ማትሪክስ ሰሌዳዎን ያዘጋጁ!</div>

    <div class="matrix-grid" id="cartel-view">
        </div>

    <button class="btn-register" id="action-btn" onclick="registerCartel()">በ 10 ብር ተመዝገብ 🎰</button>

    <div class="winner-popup" id="winner-screen">
        <div class="crown">👑</div>
        <div class="win-title">BINGO!</div>
        <div class="win-name" id="winner-text">Demeku Zemene Won!</div>
        <div style="color:#a5a1d4; font-size:12px;">CARTEL NO #390</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
        let myNumbers = [];

        // 🎲 5x5 ካርቴላ በዘፈቀደ ማውጫ ሎጂክ (መሀሉ ኮከብ ነው)
        function generateCartel() {
            const view = document.getElementById('cartel-view');
            view.innerHTML = '';
            myNumbers = [];
            
            let pools = [
                Array.from({length: 15}, (_, i) => i + 1),
                Array.from({length: 15}, (_, i) => i + 16),
                Array.from({length: 15}, (_, i) => i + 31),
                Array.from({length: 15}, (_, i) => i + 46),
                Array.from({length: 15}, (_, i) => i + 61)
            ];

            for(let row=0; row<5; row++) {
                for(let col=0; col<5; col++) {
                    const cell = document.createElement('div');
                    if(row === 2 && col === 2) {
                        cell.className = "grid-cell star";
                        cell.innerText = "⭐";
                    } else {
                        cell.className = "grid-cell";
                        let randIndex = Math.floor(Math.random() * pools[col].length);
                        let num = pools[col].splice(randIndex, 1)[0];
                        cell.innerText = num;
                        cell.id = "c-" + num;
                        myNumbers.push(num);
                    }
                    view.appendChild(cell);
                }
            }
        }
        generateCartel();

        // 📥 ለፓይተን መረጃ መላኪያ (በ 10 ብር ተመዝገብ ሲል)
        function registerCartel() {
            const payload = { action: "buy_cartel", choices: myNumbers };
            tg.sendData(json.stringify(payload)); // ለፓይተን ቦቱ ዳታውን ይልካል
            document.getElementById('action-btn').disabled = true;
            document.getElementById('action-btn').innerText = "በመጠባበቅ ላይ...";
        }

        // 🔄 በየሰከንዱ ከፓይተን መረጃዎችን እየተቀበለ የካርቴላ ቁጥሮችን የሚያበራ ሎጂክ
        function syncLiveGame() {
            fetch('http://localhost:8080/game-state') // Pydroid 3 Local ሰርቨርህ
                .then(res => res.json())
                .then(data => {
                    document.getElementById('timer').innerText = data.timer + " s";
                    
                    // የወጡ ቁጥሮች ካሉ በካርቴላችን ላይ ማብራት
                    data.called_list.forEach(num => {
                        const target = document.getElementById("c-" + num);
                        if(target) target.classList.add('hit');
                    });

                    // አሸናፊ ካለ ፖፕአፑን ማሳየት
                    if(data.winner_name) {
                        document.getElementById('winner-text').innerText = data.winner_name + " አሸንፏል!";
                        document.getElementById('winner-screen').style.display = 'flex';
                    } else {
                        document.getElementById('winner-screen').style.display = 'none';
                    }
                }).catch(() => {});
        }
        setInterval(syncLiveGame, 1000);
    </script>
</body>
</html>
