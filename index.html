<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #131129;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* የላይኛው መረጃ ሰሌዳ */
        .header {
            display: flex;
            justify-content: space-around;
            background: #1e1b4b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .balance-txt { color: #00ffcc; font-weight: bold; font-size: 15px; }
        .status-txt { color: #ff3366; font-weight: bold; }
        
        .instruction {
            color: #00ffcc;
            font-size: 13px;
            margin: 10px 0;
            background: rgba(0, 255, 204, 0.08);
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed #00ffcc;
        }

        /* የገጾች መቆጣጠሪያ (Tabs) */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- 1. የጨዋታ ገጽ ስታይል --- */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            background: #1a1636;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .num-btn {
            background: #25214d;
            border: 1px solid #3b3675;
            color: #a5a1d4;
            padding: 10px 0;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .num-btn.selected { background: #00ffaa; color: #131129; border-color: #00ffaa; }
        .num-btn.auto-filled { background: #ff6600; color: #ffffff; border-color: #ff6600; }

        .cartel-section {
            background: #1a1636;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2e295e;
        }
        .cartel-title {
            text-align: left;
            font-size: 15px;
            color: #ffcc00;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .matrix-cell {
            background: #25214d;
            border: 2px dashed #47418c;
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }
        .matrix-cell.filled { background: #ffffff; color: #131129; border-style: solid; border-color: #ffffff; }
        .matrix-cell.center-star { background: #ffcc00; color: #131129; font-size: 22px; border-style: solid; border-color: #ffcc00; }

        .play-btn {
            background: #47418c;
            color: #7975a8;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
        }

        /* --- 2. የዋሌት ገጽ ስታይል --- */
        .wallet-card {
            background: #1a1636;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }
        .section-title { font-size: 16px; color: #ffcc00; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #a5a1d4; margin-bottom: 5px; }
        .input-field {
            width: 100%;
            background: #25214d;
            border: 1px solid #3b3675;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .deposit-btn { background: #ff5500; color: white; }
        .withdraw-btn { background: #00cc88; color: #131129; }

        /* --- የታችኛው ማውጫ (Footer) --- */
        .footer-nav {
            display: flex;
            justify-content: space-around;
            background: #1a1636;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 0;
            border-top: 1px solid #2e295e;
            z-index: 1000;
        }
        .nav-item {
            color: #7975a8;
            font-size: 12px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            width: 33%;
        }
        .nav-item.active { color: #00ffaa; }
    </style>
</head>
<body>

    <div class="header">
        <div>ዋና ሂሳብ<br><span id="balance-display" class="balance-txt">100.00 ብር</span></div>
        <div>ቀሪ ሰከንድ<br><span style="color:#ffcc00; font-weight: bold;">30 s</span></div>
        <div>ሁኔታ<br><span class="status-txt">🔴 የቀጥታ ጨዋታ!</span></div>
    </div>

    <div id="game-tab" class="tab-content active">
        <div class="instruction">
            💡 እባክዎ ከታች ካለው ሰሌዳ <b>1 ቁጥር ብቻ</b> ይምረጡ፤ የቀሩትን 23 ቁጥሮች ሲስተሙ ራሱ በኦቶማቲክ ሞልቶ 5x5 ማትሪክስ ይሰጥዎታል!
        </div>
        
        <div class="numbers-grid" id="numbers-board"></div>

        <div class="cartel-section">
            <div class="cartel-title">
                <span>የአሁኑ ማትሪክስ ሰሌዳ</span>
                <span id="cartel-count" style="font-size:12px; color:#a5a1d4;">(0/24)</span>
            </div>
            <div class="matrix-grid" id="bingo-matrix"></div>
        </div>

        <button id="main-play-btn" class="play-btn" disabled>መጀመሪያ ቁጥር ይምረጡ 🎰</button>
    </div>

    <div id="wallet-tab" class="tab-content">
        <div class="wallet-card">
            <div class="section-title">📥 ብር መሙያ (Deposit)</div>
            <div class="input-group">
                <label>የሚሞላው የብር መጠን</label>
                <input type="number" id="deposit-amount" class="input-field" placeholder="ምሳሌ: 100">
            </div>
            <button class="action-btn deposit-btn" onclick="sendWalletAction('deposit')">በቴሌብር/በባንክ ይሙሉ</button>
        </div>

        <div class="wallet-card">
            <div class="section-title">💸 ብር ማውጫ (Withdraw)</div>
            <div class="input-group">
                <label>የባንክ ስም</label>
                <input type="text" id="withdraw-bank" class="input-field" placeholder="የባንክ ስም ያስገቡ">
            </div>
            <div class="input-group">
                <label>የአካውንት ቁጥር</label>
                <input type="text" id="withdraw-account" class="input-field" placeholder="የሂሳብ ቁጥር ያስገቡ">
            </div>
            <div class="input-group">
                <label>የሚወጣው የብር መጠን</label>
                <input type="number" id="withdraw-amount" class="input-field" placeholder="ምሳሌ: 500">
            </div>
            <button class="action-btn withdraw-btn" onclick="sendWalletAction('withdraw')">ፎርሙን ለቦቱ ላክ</button>
        </div>
    </div>

    <div id="referral-tab" class="tab-content">
        <div class="wallet-card" style="text-align: center; padding: 30px 20px;">
            <div style="font-size: 50px; margin-bottom: 15px;">👥</div>
            <div class="section-title" style="justify-content: center;">የሪፈራል ፕሮግራም</div>
            <p style="color: #a5a1d4; font-size: 14px; line-height: 1.5; margin-bottom: 20px;">
                ጓደኞችዎን ይጋብዙ እና ለእያንዳንዱ በተሳካ ሁኔታ ለሚመዘገብ ሰው <b>የ 5.00 ብር ስጦታ</b> ያግኙ!
            </p>
            <button class="action-btn" style="background: linear-gradient(135deg, #00b4db, #00ffaa); color:#131129;" onclick="sendWalletAction('referral')">🔗 የጋበዣ ሊንክ ማግኛ</button>
        </div>
    </div>

    <div style="height: 70px;"></div>

    <div class="footer-nav">
        <button class="nav-item active" onclick="switchTab('game-tab', this)"><span>🎮</span><span>ጨዋታ</span></button>
        <button class="nav-item" onclick="switchTab('wallet-tab', this)"><span>💼</span><span>ዋሌት</span></button>
        <button class="nav-item" onclick="switchTab('referral-tab', this)"><span>👥</span><span>ሪፈራል</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const userBalance = urlParams.get('balance') || '100.00';
        document.getElementById('balance-display').innerText = parseFloat(userBalance).toFixed(2) + " ብር";

        let finalChoices = [];

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        // ከ 1 እስከ 70 ቁጥሮች ሰሌዳ መፍጠር
        const board = document.getElementById('numbers-board');
        for (let i = 1; i <= 70; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.id = 'num-' + i;
            btn.innerText = i;
            btn.onclick = () => selectAndAutoFill(i);
            board.appendChild(btn);
        }

        const matrixContainer = document.getElementById('bingo-matrix');
        function initMatrix() {
            matrixContainer.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                if (i === 12) {
                    cell.className = 'matrix-cell center-star';
                    cell.innerText = '⭐';
                } else {
                    cell.className = 'matrix-cell';
                    cell.innerText = '?';
                }
                matrixContainer.appendChild(cell);
            }
        }
        initMatrix();

        // ዋናው 1 ሲነካ 23ቱን በኦቶማቲክ መሙያ ሎጂክ
        function selectAndAutoFill(selectedNum) {
            document.querySelectorAll('.num-btn').forEach(b => b.className = 'num-btn');
            
            finalChoices = [];
            finalChoices.push(selectedNum);
            
            document.getElementById('num-' + selectedNum).classList.add('selected');

            while (finalChoices.length < 24) {
                let rand = Math.floor(Math.random() * 70) + 1;
                if (!finalChoices.includes(rand)) {
                    finalChoices.push(rand);
                    document.getElementById('num-' + rand).classList.add('auto-filled');
                }
            }

            renderMatrix(finalChoices);
            document.getElementById('cartel-count').innerText = "(24/24)";

            const playBtn = document.getElementById('main-play-btn');
            playBtn.disabled = false;
            playBtn.innerText = "በ 10 ብር ይጫወቱ 🎰";
            playBtn.style.background = 'linear-gradient(135deg, #00b4db, #00ffaa)';
            playBtn.style.color = '#131129';
        }

        function renderMatrix(numbers) {
            matrixContainer.innerHTML = '';
            let numIndex = 0;
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                if (i === 12) {
                    cell.className = 'matrix-cell center-star';
                    cell.innerText = '⭐';
                } else {
                    cell.className = 'matrix-cell filled';
                    cell.innerText = numbers[numIndex];
                    numIndex++;
                }
                matrixContainer.appendChild(cell);
            }
        }

        document.getElementById('main-play-btn').onclick = function() {
            if (finalChoices.length === 24) {
                const data = {
                    action: "buy_cartel",
                    cost: 10,
                    choices: finalChoices
                };
                tg.sendData(JSON.stringify(data));
                tg.close();
            }
        };

        function sendWalletAction(type) {
            let data = { action: type };
            if (type === 'deposit') {
                const amt = document.getElementById('deposit-amount').value;
                if(!amt) { alert('እባክዎ መጀመሪያ የብር መጠን ያስገቡ!'); return; }
                data.amount = amt;
            } else if (type === 'withdraw') {
                const bank = document.getElementById('withdraw-bank').value;
                const acc = document.getElementById('withdraw-account').value;
                const amt = document.getElementById('withdraw-amount').value;
                if(!bank || !acc || !amt) { alert('እባክዎ ሁሉንም ክፍት ቦታዎች ይሙሉ!'); return; }
                data.bank = bank;
                data.account = acc;
                data.amount = amt;
            }
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
