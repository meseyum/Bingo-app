<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        .header-panel {
            display: flex;
            justify-content: space-around;
            background: #16162a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #2e2e4f;
        }
        .stat-box {
            font-size: 12px;
            color: #8b8baf;
        }
        .stat-val {
            font-size: 16px;
            font-weight: bold;
            color: #00ffcc;
            margin-top: 3px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 360px;
            margin: 0 auto;
            background: #16162a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2e2e4f;
        }
        .cell {
            background: #242442;
            border: 1px solid #3d3d6b;
            border-radius: 6px;
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell:active {
            transform: scale(0.95);
        }
        .cell.selected {
            background: #ff6600;
            border-color: #ff9933;
            box-shadow: 0 0 10px #ff6600;
        }
        .action-btn {
            background: #4e54c8;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            width: 100%;
            max-width: 360px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(78, 84, 200, 0.4);
        }
        .action-btn:disabled {
            background: #444455;
            color: #888899;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- የላይኛው መረጃ ሰሌዳ -->
    <div class="header-panel">
        <div class="stat-box">WALLET<div class="stat-val" id="wallet-val">5000 ብር</div></div>
        <div class="stat-box">PLAYERS<div class="stat-val" id="players-val">0</div></div>
        <div class="stat-box">ፈራሽ<div class="stat-val" id="ferash-val">0 ብር</div></div>
        <div class="stat-box">ROUND<div class="stat-val" id="round-val">#1001</div></div>
    </div>

    <h3 style="color: #ffcc00; margin: 10px 0;">🎰 የካርቴል ቁጥርዎን ይምረጡ</h3>

    <!-- 1-25 የካርቴል ምርጫ ማውጫ ማሳያ (ልክ እንደ Dil Bingo) -->
    <div class="grid-container" id="bingo-grid"></div>

    <!-- ማረጋገጫ ቁልፍ -->
    <button class="action-btn" id="confirm-btn" onclick="submitSelection()" disabled>CONFIRM (እርግጠኛ ነኝ)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // ዌብ አፑን ሙሉ ገጽ ያደርገዋል

        // URL ላይ የመጡ የቦት ዳታዎችን ማንበብ
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('balance')) document.getElementById('wallet-val').innerText = urlParams.get('balance') + " ብር";
        if(urlParams.get('players')) document.getElementById('players-val').innerText = urlParams.get('players');
        if(urlParams.get('ferash')) document.getElementById('ferash-val').innerText = urlParams.get('ferash') + " ብር";
        if(urlParams.get('game_id')) document.getElementById('round-val').innerText = "#" + urlParams.get('game_id');

        let selectedCartel = null;
        const grid = document.getElementById('bingo-grid');

        // 25 የካርቴል መምረጫ ቁልፎችን መፍጠር
        for (let i = 1; i <= 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cell.onclick = () => selectCell(i, cell);
            grid.appendChild(cell);
        }

        function selectCell(num, element) {
            // የድሮውን ምርጫ ማንሳት
            const activeCell = document.querySelector('.cell.selected');
            if (activeCell) activeCell.classList.remove('selected');

            // አዲሱን መምረጥ
            selectedCartel = num;
            element.classList.add('selected');
            document.getElementById('confirm-btn').disabled = false;
        }

        // መረጃውን ወደ ቴሌግራም ቦት መልሶ መላኪያ ዋናው ሲስተም (ልክ እንደ Dil Bingo)
        function submitSelection() {
            if (selectedCartel !== null) {
                const dataToSend = { cartel_num: selectedCartel };
                tg.sendData(JSON.stringify(dataToSend)); // ዳታውን ወደ Python ቦት ይልካል
                tg.close(); // ዌብ አፑን በራሱ ይዘጋዋል
            }
        }
    </script>
</body>
</html>
