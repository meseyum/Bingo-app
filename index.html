<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo2026 Live Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1530;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 70px;
            user-select: none;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .nav-btn {
            background: #2e264f;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #231b42;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .stat-box span {
            display: block;
            color: #897fa6;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-box div {
            font-size: 14px;
            font-weight: bold;
        }
        .timer-highlight {
            color: #ffcc00;
            font-size: 16px !important;
        }
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            background: #231b42;
            padding: 12px;
            border-radius: 12px;
        }
        .num-cell {
            background: #2e264f;
            border-radius: 6px;
            padding: 10px 0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: #c9c1e6;
            transition: all 0.3s ease;
        }
        /* እውነተኛው ጨዋታ ሲጀምር የሚበሩት ቀይ ቁጥሮች */
        .num-cell.called {
            background: #d84b16 !important;
            color: #ffffff !important;
            transform: scale(1.05);
            box-shadow: 0 0 8px #d84b16;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #150f26;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2e264f;
        }
        .menu-item {
            text-align: center;
            color: #897fa6;
            font-size: 11px;
        }
        .menu-item.active { color: #00ffcc; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="Telegram.WebApp.close()">⬅ Back</button>
        <button class="nav-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>

    <div class="stats-row">
        <div class="stat-box"><span>Main Wallet</span><div id="main-wallet">2500</div></div>
        <div class="stat-box"><span>Play Wallet</span><div>0</div></div>
        <div class="stat-box"><span>Stake</span><div>10</div></div>
        <div class="stat-box"><span>Time Left</span><div id="timer" class="timer-highlight">-- s</div></div>
    </div>

    <!-- 1-88 የቁጥር ሰሌዳ -->
    <div class="numbers-grid" id="bingo-board"></div>

    <div class="bottom-nav">
        <div class="menu-item active">🎮<br>GAME</div>
        <div class="menu-item">🏆<br>SCORES</div>
        <div class="menu-item">🕒<br>HISTORY</div>
        <div class="menu-item">💼<br>WALLET</div>
        <div class="menu-item">👤<br>PROFILE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ሰሌዳውን መፍጠር
        const board = document.getElementById('bingo-board');
        for (let i = 1; i <= 88; i++) {
            board.innerHTML += `<div class="num-cell" id="cell-${i}">${i}</div>`;
        }

        // 🔄 ዋናው ማጫወቻ ሲስተም፡ በየ 2 ሴኮንዱ ከፓይተን ቦቱ ላይ የቀጥታ መረጃ በራሱ ይጎትታል (ያለ ማደስ)
        async def fetchLiveGameStatus() {
            try {
                // ይህ የምታየው ፖርት (localhost:8080) ከፓይተን ቦትህ ጋር በቀጥታ ይገናኛል
                const response = await fetch('http://localhost:8080/status');
                const data = await response.json();
                
                // 1. የሰከንድ ቆጣሪውን በራሱ ማደስ
                document.getElementById('timer').innerText = data.time_left + " s";
                document.getElementById('main-wallet').innerText = data.wallet;

                // 2. ሁሉንም ቁጥሮች መጀመሪያ ማጽዳት
                for (let i = 1; i <= 88; i++) {
                    document.getElementById(`cell-${i}`).classList.remove('called');
                }

                // 3. አዳዲስ የወጡትን ቁጥሮች በራሱ ጊዜ ቀይ ማድረግ (ማጫወት)
                data.called_balls.forEach(ball => {
                    const cell = document.getElementById(`cell-${ball}`);
                    if (cell) cell.classList.add('called');
                });

            } catch (error) {
                console.log("የቀጥታ ግንኙነት በመጠባበቅ ላይ...");
            }
        }

        // በየ 2 ሰከንድ (2000ms) በራሱ አዲስ መረጃ እንዲያመጣ ማዘዝ
        setInterval(fetchLiveGameStatus, 2000);
    </script>
</body>
</html>
