<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIL BINGO 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #131129;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px; text-align: center;
            -webkit-user-select: none; user-select: none;
        }
        .header-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px; margin-bottom: 15px;
        }
        .stat-box {
            background: #221d47; padding: 8px 4px; border-radius: 8px; font-size: 11px; color: #a5a1d4;
        }
        .stat-val { display: block; font-size: 14px; font-weight: bold; margin-top: 3px; }
        .val-main { color: #00ffcc; }
        .val-play { color: #ffcc00; }
        .val-stake { color: #ffffff; }
        .val-timer { color: #ff3366; }

        .numbers-grid {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px;
            background: #1a1636; padding: 10px; border-radius: 10px; margin-bottom: 15px;
        }
        .num-btn {
            background: #25214d; border: 1px solid #3b3675; color: #a5a1d4;
            padding: 8px 0; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        .num-btn.selected { background: #ff5500; color: #ffffff; border-color: #ff5500; }
        .num-btn.auto-filled { background: #2e295e; color: #00ffaa; border-color: #00ffaa; }

        .matrix-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 10px; }
        .matrix-cell {
            background: #25214d; border: 2px dashed #47418c; border-radius: 8px;
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: bold;
        }
        .matrix-cell.filled { background: #ffffff; color: #131129; border-style: solid; }
        .matrix-cell.star { background: #ffcc00; color: #131129; font-size: 20px; border-style: solid; }

        .play-btn {
            background: #47418c; color: #7975a8; border: none; width: 100%;
            padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; margin-top: 15px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .footer-nav {
            display: flex; background: #1a1636; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 0; border-top: 1px solid #2e295e;
        }
        .nav-item { color: #7975a8; font-size: 12px; background: none; border: none; width: 33%; cursor: pointer; }
        .nav-item.active { color: #00ffaa; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">MAIN WALLET<span id="lbl-main" class="stat-val val-main">0</span></div>
        <div class="stat-box">PLAY WALLET<span id="lbl-play" class="stat-val val-play">0</span></div>
        <div class="stat-box">STAKE<span class="stat-val val-stake">10</span></div>
        <div class="stat-box">TIMER<span id="lbl-timer" class="stat-val val-timer">30 s</span></div>
    </div>

    <div id="tab-game" class="tab-content active">
        <div class="numbers-grid" id="grid-board"></div>
        <div style="background:#1a1636; padding:12px; border-radius:10px;">
            <div style="text-align:left; font-size:14px; color:#ffcc00;">የአሁኑ ማትሪክስ ሰሌዳ</div>
            <div class="matrix-grid" id="matrix-board"></div>
        </div>
        <button id="btn-submit" class="play-btn" disabled>መጀመሪያ ቁጥር ይምረጡ</button>
    </div>

    <div id="tab-wallet" class="tab-content" style="padding: 20px 10px;">
        <input type="number" id="dep-amt" placeholder="የሚሞላው የብር መጠን" style="width:100%; padding:12px; margin-bottom:10px; border-radius:6px; border:none;"><br>
        <button onclick="sendAction('deposit')" style="width:100%; padding:12px; background:#ff5500; color:white; border:none; border-radius:6px; font-weight:bold;">በቴሌብር ይሙሉ</button>
    </div>

    <div id="tab-ref" class="tab-content" style="padding: 40px 10px;">
        <h3>የሪፈራል ፕሮግራም</h3>
        <button onclick="sendAction('referral')" style="padding:12px 24px; background:#00ffaa; color:#131129; border:none; border-radius:6px; font-weight:bold;">የመጋበዣ ሊንክ አውጣ</button>
    </div>

    <div style="height:70px;"></div>
    <div class="footer-nav">
        <button class="nav-item active" onclick="switchTab('tab-game', this)">GAME</button>
        <button class="nav-item" onclick="switchTab('tab-wallet', this)">WALLET</button>
        <button class="nav-item" onclick="switchTab('tab-ref', this)">REFERRAL</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('lbl-main').innerText = urlParams.get('main_wallet') || '0';
        document.getElementById('lbl-play').innerText = urlParams.get('play_wallet') || '0';

        let selectedNumbers = [];

        // ከ 1 እስከ 70 ቁጥሮች ሰሌዳ መፍጠር
        const board = document.getElementById('grid-board');
        for(let i=1; i<=70; i++) {
            const b = document.createElement('button');
            b.className = 'num-btn'; b.innerText = i;
            b.onclick = () => doAutoFill(i);
            board.appendChild(b);
        }

        function initMatrix() {
            const mb = document.getElementById('matrix-board'); mb.innerHTML = '';
            for(let i=0; i<25; i++) {
                const c = document.createElement('div');
                c.className = (i===12) ? 'matrix-cell star' : 'matrix-cell';
                c.innerText = (i===12) ? '⭐' : '?';
                mb.appendChild(c);
            }
        }
        initMatrix();

        // 1 ቁጥር ሲነካ የቀሩትን 23 ራሱ በኦቶማቲክ መሙያ ሎጂክ
        function doAutoFill(num) {
            document.querySelectorAll('.num-btn').forEach(btn => btn.className = 'num-btn');
            selectedNumbers = [num];
            document.querySelectorAll('.num-btn')[num-1].classList.add('selected');

            while(selectedNumbers.length < 24) {
                let r = Math.floor(Math.random() * 70) + 1;
                if(!selectedNumbers.includes(r)) {
                    selectedNumbers.push(r);
                    document.querySelectorAll('.num-btn')[r-1].classList.add('auto-filled');
                }
            }

            const mb = document.getElementById('matrix-board'); mb.innerHTML = '';
            let idx = 0;
            for(let i=0; i<25; i++) {
                const c = document.createElement('div');
                if(i===12) { c.className = 'matrix-cell star'; c.innerText = '⭐'; }
                else { c.className = 'matrix-cell filled'; c.innerText = selectedNumbers[idx++]; }
                mb.appendChild(c);
            }

            const sBtn = document.getElementById('btn-submit');
            sBtn.disabled = false; sBtn.innerText = "በ 10 ብር ተመዝገብ 🎰";
            sBtn.style.background = '#00ffaa'; sBtn.style.color = '#131129';
        }

        document.getElementById('btn-submit').onclick = function() {
            tg.sendData(JSON.stringify({ action: "buy_cartel", choices: selectedNumbers }));
            tg.close();
        };

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function sendAction(type) {
            let d = { action: type };
            if(type === 'deposit') d.amount = document.getElementById('dep-amt').value;
            tg.sendData(JSON.stringify(d)); tg.close();
        }
    </script>
</body>
</html>
