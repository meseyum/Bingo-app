<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super 2026 Coin Wheel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: sans-serif; text-align: center; padding: 20px; overflow-x: hidden; }
        h1 { color: #ffd700; font-size: 22px; }
        .balance-box { background: #16213e; padding: 10px; border-radius: 10px; display: inline-block; margin-bottom: 20px; border: 1px solid #0f3460; }
        #user-balance { font-weight: bold; color: #2ecc71; }
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 0 auto 20px auto; }
        .pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff4141; z-index: 10; }
        canvas { border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); will-change: transform; transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .bet-section, .color-section { background: #16213e; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .grid-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .btn { background: #0f3460; color: white; border: none; padding: 10px 5px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn.selected { background: #ffd700; color: #1a1a2e; box-shadow: 0 0 8px #ffd700; }
        .spin-btn { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; font-size: 18px; padding: 12px; border-radius: 30px; border: none; cursor: pointer; width: 80%; font-weight: bold; margin-top: 10px; }
        .spin-btn:disabled { background: #555; }
        .result-popup { background: rgba(22, 33, 62, 0.95); border: 2px solid #ffd700; padding: 15px; border-radius: 15px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <h1>🎡 SUPER 2026 COIN WHEEL 🕹️</h1>
    <div class="balance-box">💰 ባላንስዎ: <span id="user-balance">100.00</span> ETB</div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>

    <div id="result-box" class="result-popup">
        <div id="result-msg" style="font-size: 18px; font-weight: bold;"></div>
    </div>

    <div class="bet-section">
        <label>💵 የውርርድ መጠን ይምረጡ፦</label>
        <div class="grid-buttons">
            <button class="btn bet-btn selected" onclick="selectBet(10, this)">10 ETB</button>
            <button class="btn bet-btn" onclick="selectBet(50, this)">50 ETB</button>
            <button class="btn bet-btn" onclick="selectBet(100, this)">100 ETB</button>
            <button class="btn bet-btn" onclick="selectBet(200, this)">200 ETB</button>
        </div>
    </div>

    <div class="color-section">
        <label>🎯 የሚወጣውን ቀለም ይገምቱ (20 ቀለማት)፦</label>
        <div class="grid-buttons" id="color-grid"></div>
    </div>

    <button class="spin-btn" id="spin-trigger" onclick="spinWheel()">ዊሉን አሽከርክር! 🔄</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let currentBalance = parseFloat(urlParams.get('balance')) || 100.00;
        const userId = urlParams.get('user_id'); // ከቦቱ የሚመጣውን የተጫዋች መለያ ቁጥር መያዣ
        document.getElementById('user-balance').innerText = currentBalance.toFixed(2);

        const colorsData = [
            { name: "ቀይ", code: "#ff4141", mult: 2 }, { name: "ጥቁር", code: "#2d2d2d", mult: 2 }, { name: "ሰማያዊ", code: "#3498db", mult: 3 }, { name: "ቢጫ", code: "#f1c40f", mult: 3 }, { name: "አረንጓዴ", code: "#2ecc71", mult: 5 },
            { name: "ቫዮሌት", code: "#9b59b6", mult: 5 }, { name: "ብርቱካን", code: "#e67e22", mult: 4 }, { name: "ሮዝ", code: "#e84393", mult: 4 }, { name: "ነጭ", code: "#ffffff", mult: 10 }, { name: "ግራጫ", code: "#7f8c8d", mult: 2 },
            { name: "ወርቅ", code: "#ffd700", mult: 20 }, { name: "ቡናማ", code: "#8b5a2b", mult: 3 }, { name: "ቱርኩዋዝ", code: "#1abc9c", mult: 6 }, { name: "ሊላክ", code: "#a29bfe", mult: 7 }, { name: "ሜጀንታ", code: "#fd79a8", mult: 8 },
            { name: "ሳይያን", code: "#00cec9", mult: 4 }, { name: "ኢንዲጎ", code: "#30336b", mult: 5 }, { name: "ሊም", code: "#badc58", mult: 9 }, { name: "ፒች", code: "#ffbe76", mult: 12 }, { name: "ቻርኮል", code: "#353b48", mult: 15 }
        ];

        let selectedBet = 10;
        let selectedColor = "";
        let isSpinning = false;
        let currentRotation = 0; 
        const totalSegments = colorsData.length;
        const segmentAngle = (2 * Math.PI) / totalSegments;

        const colorGrid = document.getElementById('color-grid');
        colorsData.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn color-btn';
            btn.style.borderBottom = `4px solid ${c.code}`;
            btn.innerText = `${c.name}`;
            btn.onclick = () => { if(!isSpinning) { document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedColor = c.name; }};
            colorGrid.appendChild(btn);
        });

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');

        function drawWheel() {
            ctx.clearRect(0, 0, 300, 300);
            for (let i = 0; i < totalSegments; i++) {
                const angle = i * segmentAngle - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 145, angle, angle + segmentAngle);
                ctx.fillStyle = colorsData[i].code;
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "#1a1a2e";
                ctx.stroke();
            }
        }
        drawWheel();

        function selectBet(amount, btn) { if(!isSpinning) { document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedBet = amount; }}

        function spinWheel() {
            if (isSpinning || !selectedColor || currentBalance < selectedBet) return;

            isSpinning = true;
            document.getElementById('spin-trigger').disabled = true;
            document.getElementById('result-box').style.display = "block";
            document.getElementById('result-msg').innerHTML = "🎡 ዊሉ እየተሽከረከረ ነው... 🔄";
            document.getElementById('result-msg').style.color = "white";

            currentBalance -= selectedBet;
            document.getElementById('user-balance').innerText = currentBalance.toFixed(2);

            const winningIndex = Math.floor(Math.random() * totalSegments);
            const winningObj = colorsData[winningIndex];

            const degPerSegment = 360 / totalSegments;
            const targetDegrees = 360 - (winningIndex * degPerSegment) - (degPerSegment / 2);
            currentRotation += (360 * 7) + targetDegrees - (currentRotation % 360); 

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spin-trigger').disabled = false;
                let isWin = (selectedColor === winningObj.name);
                
                if(isWin) {
                    currentBalance += (selectedBet * winningObj.mult);
                    document.getElementById('result-msg').innerHTML = `🎉 አሸንፈዋል!<br>🎯 ምርጫዎ: ${selectedColor}<br>🎡 የወጣው: ${winningObj.name}`;
                    document.getElementById('result-msg').style.color = "#2ecc71";
                } else {
                    document.getElementById('result-msg').innerHTML = `💔 ተሸንፈዋል!<br>🎯 ምርጫዎ: ${selectedColor}<br>🎡 የወጣው: ${winningObj.name}`;
                    document.getElementById('result-msg').style.color = "#ff4141";
                }
                document.getElementById('user-balance').innerText = currentBalance.toFixed(2);
                
                // 🛠️ ማስተካከያ፡ ዌብ አፑ ሳይዘጋ የባላንስ ውሂቡን ከጀርባ ለፓይተን ቦት በድብቅ መላኪያ መንገድ
                if(userId) {
                    fetch('/update_balance', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: userId,
                            current_bal: currentBalance
                        })
                    }).catch(err => console.log(err));
                }

            }, 4000);
        }
    </script>
</body>
</html>
