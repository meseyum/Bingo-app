<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #171131; color: white; font-family: sans-serif; padding: 12px; }
        
        .header-stats { display: flex; justify-content: space-between; background: #1e163d; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .stat-val { color: #00ffcc; font-weight: bold; display: block; margin-top: 4px; }

        /* 5x5 የካርቴላ ሰሌዳ ዲዛይን */
        .matrix-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 15px; }
        .grid-cell { background: #251f47; color: white; font-weight: bold; font-size: 18px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: background 0.3s ease; }
        .grid-cell.star { background: #ffcc00; color: #171131; font-size: 22px; }
        
        /* 🔥 ቁልፍ ማስተካከያ፡ እጣ የወጣላቸውን ቁጥሮች ልክ እንደ ምስሉ በደመቀ ቀለም ማሳመሪያ (ማስመሪያ) */
        .grid-cell.hit { background: #e65100 !important; color: white !important; border: 2px solid #ffb74d; }

        .btn-register { width: 100%; background: #00ffcc; color: #171131; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-register:disabled { background: #443c68; color: #7f78a7; }

        /* 🏆 አሸናፊ ሲኖር ብቅ የሚል ሰሌዳ */
        .winner-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(23, 17, 49, 0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .win-title { font-size: 36px; font-weight: bold; color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div>ዋና ሂሳብ<span class="stat-val">100.00 ብር</span></div>
        <div>ቀሪ ሰከንድ<span class="stat-val" id="timer">30 s</span></div>
        <div>የወጡ ቁጥሮች<span class="stat-val" id="called-count" style="color:#ffcc00;">0</span></div>
    </div>

    <div class="matrix-grid" id="cartel-view"></div>

    <button class="btn-register" id="action-btn" onclick="registerCartel()">በ 10 ብር ተመዝገብ 🎰</button>

    <div class="winner-popup" id="winner-screen">
        <div style="font-size: 60px;">👑</div>
        <div class="win-title">BINGO!</div>
        <div id="winner-text" style="font-size: 22px; margin: 15px 0;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
        let myNumbers = [];

        // 5x5 ካርቴላ ማመንጫ
        function generateCartel() {
            const view = document.getElementById('cartel-view');
            view.innerHTML = '';
            
            let pools = [
                Array.from({length: 15}, (_, i) => i + 1),
                Array.from({length: 15}, (_, i) => i + 16),
                Array.from({length: 15}, (_, i) => i + 31),
                Array.from({length: 15}, (_, i) => i + 46),
                Array.from({length: 15}, (_, i) => i + 61)
            ];

            for(let row=0; row<5; row++) {
                for(let col=0; col<5; col++) {
                    const cell = document.createElement('div');
                    if(row === 2 && col === 2) {
                        cell.className = "grid-cell star";
                        cell.innerText = "⭐";
                    } else {
                        cell.className = "grid-cell";
                        let randIndex = Math.floor(Math.random() * pools[col].length);
                        let num = pools[col].splice(randIndex, 1)[0];
                        cell.innerText = num;
                        cell.id = "num-" + num; // ለእያንዳንዱ ቁጥር መለያ መስጠት
                        myNumbers.push(num);
                    }
                    view.appendChild(cell);
                }
            }
        }
        generateCartel();

        function registerCartel() {
            tg.sendData(JSON.stringify({ action: "buy_cartel", choices: myNumbers }));
            document.getElementById('action-btn').disabled = true;
            document.getElementById('action-btn').innerText = "ጨዋታው እስኪጀምር ይጠብቁ...";
        }

        // 🔄 በየሰከንዱ ከፓይተን ሰርቨር ጋር እየተገናኘ ቁጥሮችን የሚያሰምር ሎጂክ
        function syncLiveGame() {
            fetch('http://localhost:8080/game-state')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('timer').innerText = data.timer + " s";
                    document.getElementById('called-count').innerText = data.called_list.length;
                    
                    // 🔥 ፓይተን ያወጣቸውን ቁጥሮች በሙሉ እያረጋገጠ ቀለም ያሰምራል!
                    data.called_list.forEach(num => {
                        const cell = document.getElementById("num-" + num);
                        if(cell) {
                            cell.classList.add('hit'); // ብርቱካናማ ቀለም ያደርገዋል
                        }
                    });

                    if(data.winner_name) {
                        document.getElementById('winner-text').innerText = data.winner_name + " አሸንፏል! 🏆";
                        document.getElementById('winner-screen').style.display = 'flex';
                    } else {
                        document.getElementById('winner-screen').style.display = 'none';
                    }
                }).catch(() => {});
        }
        setInterval(syncLiveGame, 1000); // በየ 1 ሰከንዱ መረጃ ያድሳል
    </script>
</body>
</html>
