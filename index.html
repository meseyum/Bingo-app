<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super 2026 Coin Wheel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 { color: #ffd700; margin-bottom: 5px; font-size: 24px; }
        .balance-box {
            background: #16213e;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        /* --- 🎡 የዊል ዲዛይን --- */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 20px auto;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff4141;
            z-index: 10;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.6), 0 0 10px #ffd700;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        /* --- 🎛️ የውርርድ መቆጣጠሪያ --- */
        .bet-section, .color-section {
            background: #16213e;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .btn {
            background: #0f3460;
            color: white;
            border: none;
            padding: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn.selected { background: #ffd700; color: #1a1a2e; }
        .spin-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            font-size: 18px;
            padding: 12px 40px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            width: 80%;
            margin-top: 10px;
        }
        .spin-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; }
        #result-msg { font-size: 18px; font-weight: bold; margin-top: 15px; min-height: 25px; }
    </style>
</head>
<body>

    <h1>🎡 SUPER 2026 COIN WHEEL 🕹️</h1>
    <div class="balance-box">💰 ባላንስዎ: <span id="user-balance">0.00</span> ETB</div>

    <!-- 🎡 የሚሽከረከረው ጎማ -->
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>

    <div id="result-msg"></div>

    <!-- 💰 የውርርድ መጠን መምረጫ -->
    <div class="bet-section">
        <label>💵 የውርርድ መጠን ይምረጡ፦</label>
        <div class="grid-buttons">
            <button class="btn bet-btn selected" onclick="selectBet(10, this)">10 ETB</button>
            <button class="btn bet-btn" onclick="selectBet(50, this)">50 ETB</button>
            <button class="btn bet-btn" onclick="selectBet(100, this)">100 ETB</button>
            <button class="btn bet-btn" onclick="selectBet(200, this)">200 ETB</button>
        </div>
    </div>

    <!-- 🎨 የ 20ቱ ቀለሞች መምረጫ -->
    <div class="color-section">
        <label>🎯 የሚወጣውን ቀለም ይገምቱ (20 ቀለማት)፦</label>
        <div class="grid-buttons" id="color-grid"></div>
    </div>

    <button class="spin-btn" id="spin-trigger" onclick="spinWheel()">ዊሉን አሽከርክር! 🔄</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // ሙሉ ስክሪን እንዲሆን

        // የ 20ቱ ቀለሞች ዝርዝር ከነ ከለር ኮዳቸው
        const colorsData = [
            { name: "ቀይ", code: "#ff4141" }, { name: "ጥቁር", code: "#2d2d2d" }, { name: "ሰማያዊ", code: "#3498db" }, { name: "ቢጫ", code: "#f1c40f" }, { name: "አረንጓዴ", code: "#2ecc71" },
            { name: "ቫዮሌት", code: "#9b59b6" }, { name: "ብርቱካን", code: "#e67e22" }, { name: "ሮዝ", code: "#e84393" }, { name: "ነጭ", code: "#ffffff" }, { name: "ግራጫ", code: "#7f8c8d" },
            { name: "ወርቅ", code: "#ffd700" }, { name: "बुናማ", code: "#8b5a2b" }, { name: "ቱርኩዋዝ", code: "#1abc9c" }, { name: "ሊላክ", code: "#a29bfe" }, { name: "ሜጀንታ", code: "#fd79a8" },
            { name: "ሳይያን", code: "#00cec9" }, { name: "ኢንዲగో", code: "#30336b" }, { name: "ሊም", code: "#badc58" }, { name: "ፒች", code: "#ffbe76" }, { name: "ቻርኮል", code: "#353b48" }
        ];

        let currentBalance = 100.00; // መነሻ (ከቦቱ በራስ ሰር ይዘመናል)
        let selectedBet = 10;
        let selectedColor = "";
        let isSpinning = false;

        // URL ላይ ያለውን ባላንስ ማንበቢያ
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('balance')) {
            currentBalance = parseFloat(urlParams.get('balance'));
        }
        document.getElementById('user-balance').innerText = currentBalance.toFixed(2);

        // ቀለማቱን በኪቦርድ መልክ መፍጠሪያ
        const colorGrid = document.getElementById('color-grid');
        colorsData.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn color-btn';
            btn.style.borderBottom = `4px solid ${c.code}`;
            btn.innerText = c.name;
            btn.onclick = () => selectColor(c.name, btn);
            colorGrid.appendChild(btn);
        });

        // ዊሉን በፈጠራ መሳያ (Canvas)
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const numSegments = colorsData.length;
        const anglePerSegment = (2 * Math.PI) / numSegments;

        function drawWheel() {
            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, i * anglePerSegment, (i + 1) * anglePerSegment);
                ctx.fillStyle = colorsData[i].code;
                ctx.fill();
                ctx.save();
                ctx.closePath();
            }
        }
        drawWheel();

        function selectBet(amount, btn) {
            if(isSpinning) return;
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedBet = amount;
        }

        function selectColor(colorName, btn) {
            if(isSpinning) return;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedColor = colorName;
        }

        // 🎡 የዊል ማሽከርከሪያ ዋና ሎጂክ
        function spinWheel() {
            if (isSpinning) return;
            if (!selectedColor) {
                alert("እባክዎ መጀመሪያ የሚገምቱትን ቀለም ይምረጡ!");
                return;
            }
            if (currentBalance < selectedBet) {
                alert("ይቅርታ፣ በቂ ባላንስ የለዎትም!");
                return;
            }

            isSpinning = true;
            document.getElementById('spin-trigger').disabled = true;
            document.getElementById('result-msg').innerText = "🎡 ዊሉ በከፍተኛ ፍጥነት እየተሽከረከረ ነው... 🔄";

            // ውጤቱን በዘፈቀደ መምረጥ
            const winningIndex = Math.floor(Math.random() * numSegments);
            const winningColor = colorsData[winningIndex].name;

            // አኒሜሽኑ የሚቆምበትን ዲግሪ ማስላት (360 ዲግሪ * 5 ዙር + ወደ ከለሩ መድረሻ)
            const extraDegrees = 360 - (winningIndex * (360 / numSegments)) - (360 / numSegments / 2);
            const totalRotation = (360 * 5) + extraDegrees; 

            canvas.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spin-trigger').disabled = false;
                
                let isWin = (selectedColor === winningColor);
                
                // ወደ ቴሌግራም ቦቱ ውጤቱን መላክ
                const gameResult = {
                    bet: selectedBet,
                    chosen: selectedColor,
                    won: winningColor,
                    status: isWin ? "WIN" : "LOSE"
                };
                
                tg.sendData(JSON.stringify(gameResult)); // ውጤቱን ወደ ቦቱ ያስተላልፋል
                tg.close(); // ዌብ አፑን ይዘጋዋል
            }, 4000); // 4 ሰከንድ አኒሜሽን
        }
    </script>
</body>
</html>
