<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Bingo 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 10px 10px 90px 10px;
            text-align: center;
            user-select: none;
        }
        .header-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .stat-box {
            background: #161b26;
            padding: 6px 2px;
            border-radius: 6px;
            border: 1px solid #232d3f;
        }
        .stat-box span {
            display: block;
            font-size: 9px;
            color: #8a99ad;
            margin-bottom: 2px;
        }
        .stat-box strong {
            font-size: 11px;
            color: #00ffcc;
        }
        .dashboard-section {
            background: #111622;
            border: 2px solid #1f293d;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
        }
        .bingo-letters {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        .letter-box {
            font-size: 18px;
            font-weight: bold;
            padding: 6px 0;
            border-radius: 6px;
            color: white;
        }
        .b-bg { background: #e67e22; }
        .i-bg { background: #2980b9; }
        .n-bg { background: #c0392b; }
        .g-bg { background: #27ae60; }
        .o-bg { background: #8e44ad; }

        .called-number-display {
            background: #1b2234;
            border: 2px dashed #f1c40f;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
        }
        .called-number-display span {
            font-size: 12px;
            color: #f1c40f;
            display: block;
        }
        .called-number-display strong {
            font-size: 32px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: #161b26;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #232d3f;
        }
        .cell {
            background: #2c3e50;
            color: #bdc3c7;
            font-weight: bold;
            font-size: 12px;
            padding: 8px 0;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #34495e;
            transition: all 0.1s ease;
        }
        /* ተጫዋቹ የመረጠው (የገዛው) ካርድ መጀመሪያ ብርቱካናማ ይሆናል */
        .cell.selected {
            background: #d35400 !important;
            color: white !important;
            border-color: #ba4a00;
        }
        /* 🌟 የተመረጠው ካርድ በዕድል ሲመታ (ሲጠራ) ደምቅ ብሎ ቢጫ ይሆናል */
        .cell.called {
            background: #f1c40f !important;
            color: #000000 !important;
            box-shadow: 0 0 10px #f1c40f;
            font-size: 14px;
        }

        .footer-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0b0e14;
            padding: 10px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            z-index: 9999;
        }
        .submit-btn {
            background: #2ecc71;
            color: white;
            border: none;
            width: 90%;
            padding: 14px 0;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="stat-box">
            <span>WALLET</span>
            <strong id="wallet-bal">5000 ብር</strong>
        </div>
        <div class="stat-box">
            <span>PLAYERS</span>
            <strong id="total-players">0</strong>
        </div>
        <div class="stat-box">
            <span>ፈራሽ</span>
            <strong id="ferash-pool">0 ብር</strong>
        </div>
        <div class="stat-box">
            <span>ROUND</span>
            <strong id="round-status" style="font-size:8px; color:#f1c40f;">በቂ ተጫዋች...</strong>
        </div>
    </div>

    <div class="dashboard-section">
        <div class="bingo-letters">
            <div class="letter-box b-bg">B</div>
            <div class="letter-box i-bg">I</div>
            <div class="letter-box n-bg">N</div>
            <div class="letter-box g-bg">G</div>
            <div class="letter-box o-bg">O</div>
        </div>
        
        <div class="called-number-display">
            <span id="game-notif">ቁጥር ለመምረጥ ሳጥኖቹን ይጫኑ</span>
            <strong id="current-ball">-</strong>
        </div>
    </div>

    <h4 style="color: #f39c12; margin: 5px 0; font-size: 13px;">🎫 የጨዋታ ካርድዎን ይምረጡ (1-100)</h4>

    <div class="grid-container" id="bingo-grid"></div>

    <div class="footer-container">
        <button class="submit-btn" id="confirm-btn">ምርጫዬን አረጋግጣለሁ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const balance = urlParams.get('balance') || '5000';
        const players = urlParams.get('players') || '0';
        const ferash = urlParams.get('ferash') || '0';
        const status = urlParams.get('status') || 'በቂ ተጫዋች እየተጠባበቀ ነው...';

        document.getElementById('wallet-bal').innerText = balance + " ብር";
        document.getElementById('total-players').innerText = players;
        document.getElementById('ferash-pool').innerText = ferash + " ብር";
        document.getElementById('round-status').innerText = status;

        const grid = document.getElementById('bingo-grid');
        const markedNumbers = [];
        const cellsMap = {};

        for (let i = 1; i <= 100; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cellsMap[i] = cell;
            
            cell.addEventListener('click', () => {
                if (!cell.classList.contains('called')) {
                    if (cell.classList.contains('selected')) {
                        cell.classList.remove('selected');
                        const index = markedNumbers.indexOf(i);
                        if (index > -1) markedNumbers.splice(index, 1);
                    } else {
                        cell.classList.add('selected');
                        markedNumbers.push(i);
                    }
                }
            });
            grid.appendChild(cell);
        }

        document.getElementById('confirm-btn').addEventListener('click', () => {
            if (markedNumbers.length === 0) {
                alert("እባክዎ መጀመሪያ ቢያንስ አንድ ቁጥር ይምረጡ!");
                return;
            }

            document.getElementById('confirm-btn').style.display = 'none';
            document.getElementById('game-notif').innerText = "🎰 የእርስዎ ካርዶች እየተመቱ ነው...";

            // 🌟 ሎጂክ ማስተካከያ፦ ከ 1-100 በዘፈቀደ ሳይሆን፣ ሰውየው ከመረጣቸው (markedNumbers) ውስጥ ብቻ ዕድለኛ ቁጥሮችን ማውጣት
            let luckyBalls = [];
            
            // ተጫዋቹ ከመረጠው ቁጥር ውስጥ በዘፈቀደ አገላብጦ (Shuffle) በየተራ ለመጥራት
            let shuffledSelections = [...markedNumbers].sort(() => Math.random() - 0.5);
            
            // ቢበዛ 25 ቁጥሮችን ወይም ተጫዋቹ የመረጠውን ያህል በሙሉ ይወስዳል
            let totalToCall = Math.min(shuffledSelections.length, 25);
            for(let k=0; k<totalToCall; k++){
                luckyBalls.push(shuffledSelections[k]);
            }

            let ballIndex = 0;
            
            const ballInterval = setInterval(() => {
                if (ballIndex < luckyBalls.length) {
                    let currentBall = luckyBalls[ballIndex];
                    
                    let prefix = "";
                    if (currentBall <= 20) prefix = "B-";
                    else if (currentBall <= 40) prefix = "I-";
                    else if (currentBall <= 60) prefix = "N-";
                    else if (currentBall <= 80) prefix = "G-";
                    else prefix = "O-";

                    document.getElementById('current-ball').innerText = prefix + currentBall;
                    
                    // 🌟 ሰውየው የመረጠውን (selected) የነበረውን ሳጥን ብቻ ወደ ቢጫ (called) መቀየር
                    if (cellsMap[currentBall]) {
                        cellsMap[currentBall].classList.remove('selected');
                        cellsMap[currentBall].classList.add('called');
                    }

                    ballIndex++;
                } else {
                    clearInterval(ballInterval);
                    document.getElementById('game-notif').innerText = "🏁 ጨዋታው አልቋል! ውጤት ወደ ቦት እየተላከ ነው...";
                    
                    setTimeout(() => {
                        const gameData = {
                            marked_numbers: markedNumbers
                        };
                        tg.sendData(JSON.stringify(gameData));
                        tg.close();
                    }, 2000);
                }
            }, 1200); 
        });
    </script>
</body>
</html>
