<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER 2026 COIN WHEEL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #131927;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        .header {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .balance-container {
            background-color: #1c2538;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 15px 0;
            border: 1px solid #2c3a56;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-amount {
            color: #2ecc71;
            font-weight: bold;
        }
        .wheel-outer {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px 0;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #e74c3c;
            z-index: 10;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .section-title {
            font-size: 16px;
            margin: 15px 0 10px 0;
            color: #b2bec3;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 360px;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #1c2538;
            border: 1px solid #34495e;
            color: white;
            padding: 12px 5px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn.active {
            background-color: #f1c40f;
            color: #131927;
            box-shadow: 0 0 12px #f1c40f;
            border-color: #f1c40f;
        }
        .spin-btn {
            grid-column: span 4;
            background-color: #e74c3c;
            color: white;
            font-size: 18px;
            padding: 15px;
            margin-top: 10px;
            border: none;
            box-shadow: 0 5px 0 #c0392b;
        }
        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #c0392b;
        }
        .result-box {
            margin-top: 15px;
            padding: 12px;
            width: 85%;
            max-width: 340px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .win { background-color: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: #2ecc71; }
        .lose { background-color: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #e74c3c; }
    </style>
</head>
<body>

    <div class="header">🎡 SUPER 2026 COIN WHEEL 🕹️</div>
    
    <div class="balance-container">
        <span>💰 ባለንስዎ:</span>
        <span id="balance-display" class="balance-amount">95.00</span>
        <span>ETB</span>
    </div>

    <div class="wheel-outer">
        <div class="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <div class="section-title">💵 የውርርድ መጠን ይምረጡ፦</div>
    <div class="grid-container">
        <div class="btn bet-btn active" onclick="selectBet(10, this)">10 ETB</div>
        <div class="btn bet-btn" onclick="selectBet(50, this)">50 ETB</div>
        <div class="btn bet-btn" onclick="selectBet(100, this)">100 ETB</div>
        <div class="btn bet-btn" onclick="selectBet(200, this)">200 ETB</div>
    </div>

    <div class="section-title">🎯 የሚወጣውን ቀለም ይገምቱ (20 ቀለማት)፦</div>
    <div class="grid-container" id="color-grid">
        </div>

    <div class="grid-container">
        <button class="btn spin-btn" onclick="spinWheel()">🎡 አሽከርክር (SPIN)</button>
    </div>

    <div id="result" class="result-box"></div>

    <script>
        // 🔗 የቴሌግራም ሊንክ ዳታዎችን መሰብሰብ
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id') || "123456789"; 
        // ከቦቱ የመጣ ባላንስ ካለ እሱን ይወስዳል፣ ከሌለ መነሻውን 95.00 ያደርጋል
        let currentBalance = parseFloat(urlParams.get('balance')) || 95.00;

        // የ Pydroid 3 ቦትህ የሚገኝበት የአገልጋይ አድራሻ (አይፒ ቁጥርህ)
        const PYDROID_SERVER_URL = "http://127.0.0.1:8080/update_balance"; 

        document.getElementById('balance-display').innerText = currentBalance.toFixed(2);

        // 🎨 20 ቀለማት ዝርዝር በአማርኛ ስማቸው
        const colorsData = [
            { name: "ቀይ", hex: "#e74c3c" }, { name: "ጥቁር", hex: "#2d3436" }, 
            { name: "ሰማያዊ", hex: "#0984e3" }, { name: "ቢጫ", hex: "#f1c40f" },
            { name: "አረንጓዴ", hex: "#2ecc71" }, { name: "purple", hex: "#9b59b6" }, 
            { name: "ብርቱካን", hex: "#e67e22" }, { name: "ሮዝ", hex: "#fd79a8" },
            { name: "ፈዛዛ ሰማያዊ", hex: "#74b9ff" }, { name: "ጥቁር ሰማያዊ", hex: "#2c3e50" }, 
            { name: "አረንጓዴ ገላ", hex: "#55efc4" }, { name: "ቡኒ", hex: "#8c7ae6" },
            { name: "ወርቃማ", hex: "#e1b12c" }, { name: "አመድማ", hex: "#7f8c8d" }, 
            { name: "ነጭ", hex: "#ffffff" }, { name: "ወይን ጠጅ", hex: "#6c5ce7" },
            { name: "የቆዳ ቀለም", hex: "#fab1a0" }, { name: "ፈዛዛ አረንጓዴ", hex: "#a29bfe" },
            { name: "ደማቅ ቀይ", hex: "#ch-red" }, { name: "ባህር ሰማያዊ", hex: "#00cec9" }
        ];

        let selectedBetAmount = 10;
        let selectedColorName = "";
        let isSpinning = false;

        // 🏗️ ቀለማቱን በስክሪኑ ላይ መደርደር
        const colorGrid = document.getElementById('color-grid');
        colorsData.slice(0, 8).forEach(c => { 
            const div = document.createElement('div');
            div.className = "btn color-btn";
            div.innerText = c.name;
            div.style.borderBottom = `4px solid ${c.hex === '#ffffff' ? '#ccc' : c.hex}`;
            div.onclick = function() { selectColor(c.name, this); };
            colorGrid.appendChild(div);
        });

        // 🎡 የሩሌት ጎማውን በ Canvas መሳል
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const numSegments = colorsData.length;
        const anglePerSegment = (2 * Math.PI) / numSegments;

        function drawWheel() {
            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, i * anglePerSegment, (i + 1) * anglePerSegment);
                ctx.fillStyle = colorsData[i].hex;
                ctx.fill();
                ctx.stroke();
            }
        }
        drawWheel();

        function selectBet(amount, element) {
            if (isSpinning) return;
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            selectedBetAmount = amount;
        }

        function selectColor(colorName, element) {
            if (isSpinning) return;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            selectedColorName = colorName;
        }

        // 🔄 አዲሱን ባላንስ ወደ ቴሌግራም ቦት ሰርቨር መላኪያ ፈንክሽን
        function sendBalanceToBot(newBalance) {
            fetch(PYDROID_SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: parseInt(userId),
                    current_bal: parseFloat(newBalance)
                })
            })
            .then(response => response.json())
            .then(data => console.log("ዳታቤዝ ተዘምኗል:", data))
            .catch(err => console.error("ወደ ቦቱ መላክ አልተቻለም:", err));
        }

        // 🚀 ጎማውን የማሽከርከር ስራ
        function spinWheel() {
            if (isSpinning) return;
            if (!selectedColorName) {
                alert("እባክዎ መጀመሪያ የሚገምቱትን ቀለም ይምረጡ!");
                return;
            }
            if (currentBalance < selectedBetAmount) {
                alert("ይቅርታ፣ በቂ ባላንስ የለዎትም! እባክዎ ዴፖዚት ያድርጉ።");
                return;
            }

            isSpinning = true;
            currentBalance -= selectedBetAmount; // ውርርዱን ወዲያው መቀነስ
            document.getElementById('balance-display').innerText = currentBalance.toFixed(2);
            sendBalanceToBot(currentBalance); // የተቀነሰውን ባላንስ ወዲያው መቆጠብ

            const resultBox = document.getElementById('result');
            resultBox.style.display = "none";

            // በዘፈቀደ የሚወጣ ቀለም መምረጥ
            const winningIndex = Math.floor(Math.random() * numSegments);
            const winningColor = colorsData[winningIndex];

            // የማሽከርከሪያ ዲግሪ ማስላት
            const extraSpins = 5 * 360; 
            const targetAngle = (numSegments - winningIndex - 0.5) * (360 / numSegments);
            const totalRotation = extraSpins + targetAngle;

            canvas.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                canvas.style.transition = "none";
                canvas.style.transform = `rotate(${targetAngle}deg)`;
                setTimeout(() => { canvas.style.transition = "transform 4s cubic-bezier(0.1, 0.8, 0.2, 1)"; }, 50);

                // ማሸነፍ ወይም መሸነፉን ማረጋገጥ
                if (selectedColorName === winningColor.name) {
                    const winAmount = selectedBetAmount * 3; // ለቀለም ግምት 3 እጥፍ ክፍያ
                    currentBalance += winAmount;
                    resultBox.className = "result-box win";
                    resultBox.innerHTML = `🎉 አሸንፈዋል!<br>የመረጡት: ${selectedColorName}<br>የወጣው: ${winningColor.name}<br>🎁 +${winAmount} ETB`;
                } else {
                    resultBox.className = "result-box lose";
                    resultBox.innerHTML = `💔 ተሸንፈዋል!<br>የመረጡት: ${selectedColorName}<br>የወጣው: ${winningColor.name}<br>📉 -${selectedBetAmount} ETB`;
                }

                document.getElementById('balance-display').innerText = currentBalance.toFixed(2);
                resultBox.style.display = "block";
                
                // 🔄 ያሸነፈውን ወይም የተሸነፈበትን የመጨረሻ ባላንስ ወደ ቦቱ መላክ
                sendBalanceToBot(currentBalance);

                // ለቴሌግራም ቦት ውጤቱን ማሳወቅ
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.sendData(JSON.stringify({
                        status: selectedColorName === winningColor.name ? "win" : "lose",
                        chosen: selectedColorName,
                        rolled: winningColor.name,
                        new_balance: currentBalance
                    }));
                }

            }, 4000);
        }
    </script>
</body>
</html>
