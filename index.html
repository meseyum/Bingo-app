<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #171131; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px; -webkit-user-select: none; user-select: none;
        }

        /* 📊 የላይኛው መረጃ ሰሌዳ */
        .top-stats {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 15px;
        }
        .stat-box {
            background: #251c4a; border-radius: 8px; padding: 6px 2px; text-align: center;
            font-size: 10px; color: #a5a1d4; font-weight: bold;
        }
        .stat-box span { display: block; font-size: 13px; color: #ffffff; margin-top: 2px; }

        /* 🏆 ዋናው አቀማመጥ (በግራ ቁጥሮች፣ በቀኝ የቀጥታ ውጤት) */
        .main-container { display: flex; gap: 10px; margin-bottom: 15px; }
        
        /* 🔢 የቢንጎ ቁጥሮች ሰሌዳ (1-75) */
        .bingo-board {
            width: 55%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
            background: #1e163d; padding: 6px; border-radius: 10px;
        }
        .letter-header {
            text-align: center; font-weight: bold; font-size: 14px; padding: 5px 0; border-radius: 5px;
        }
        .b-lbl { background: #007bff; } .i-lbl { background: #6f42c1; } 
        .n-lbl { background: #e83e8c; } .g-lbl { background: #28a745; } .o-lbl { background: #fd7e14; }

        .num-cell {
            background: #2d235c; color: #a5a1d4; text-align: center; padding: 8px 0;
            font-size: 11px; font-weight: bold; border-radius: 6px; transition: all 0.2s;
        }
        /* 🔥 የወጡ ቁጥሮች ማብሪያ ከለር */
        .num-cell.called { background: #fd7e14 !important; color: #ffffff !important; }

        /* 📺 የቀኝ መረጃ ሰሌዳ */
        .live-side { width: 45%; display: flex; flex-direction: column; gap: 10px; }
        
        /* የቅርብ ጊዜ የወጡ 4 ቁጥሮች ታሪክ */
        .history-balls { display: flex; justify-content: space-between; gap: 2px; }
        .ball-history {
            width: 23%; aspect-ratio: 1; background: #6f42c1; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold;
        }

        /* 🔵 ትልቁ የአሁኑ ቁጥር ማሳያ */
        .current-ball-zone {
            background: #1e163d; border-radius: 10px; padding: 20px 0; text-align: center;
        }
        .big-ball {
            width: 75px; height: 75px; background: #ffffff; border: 4px solid #ffcc00;
            border-radius: 50%; color: #007bff; display: inline-flex; align-items: center;
            justify-content: center; font-size: 22px; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        /* 🔒 የመጠበቂያ ሰሌዳ (Watching Only) */
        .status-screen {
            background: #1e163d; border-radius: 10px; flex-grow: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px 10px; text-align: center; min-height: 180px;
        }
        .status-title { font-size: 18px; font-weight: bold; color: #ffffff; letter-spacing: 1px; margin-bottom: 10px; }
        .status-desc { font-size: 13px; color: #a5a1d4; line-height: 1.5; }

        /* 🔘 የታችኛው አዝራሮች */
        .bottom-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; position: fixed; bottom: 10px; left: 10px; right: 10px; }
        .btn-act { padding: 12px 0; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; }
        .btn-leave { background: #dc3545; color: white; }
        .btn-refresh { background: #343a40; color: white; }
        .btn-watch { background: #2d235c; color: #6c757d; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 📊 የላይኛው መረጃ ሰሌዳ -->
    <div class="top-stats">
        <div class="stat-box">Game ID<span id="game-id">---</span></div>
        <div class="stat-box">Players<span id="player-count">0</span></div>
        <div class="stat-box">Bet<span>10</span></div>
        <div class="stat-box">Derash<span id="pool-amount">0</span></div>
        <div class="stat-box">Called<span id="called-count">0</span></div>
    </div>

    <!-- 🏆 ዋናው አቀማመጥ -->
    <div class="main-container">
        <!-- 🔢 የቢንጎ 1-75 ሰሌዳ -->
        <div class="bingo-board" id="grid-board">
            <div class="letter-header b-lbl">B</div>
            <div class="letter-header i-lbl">I</div>
            <div class="letter-header n-lbl">N</div>
            <div class="letter-header g-lbl">G</div>
            <div class="letter-header o-lbl">O</div>
        </div>

        <!-- 📺 የቀኝ የቀጥታ መከታተያ ሰሌዳ -->
        <div class="live-side">
            <!-- የቅርብ ጊዜ 4 ታሪክ -->
            <div class="history-balls" id="history-container">
                <div class="ball-history">-</div>
                <div class="ball-history">-</div>
                <div class="ball-history">-</div>
                <div class="ball-history">-</div>
            </div>

            <!-- ትልቁ ኳስ -->
            <div class="current-ball-zone">
                <div class="big-ball" id="current-big-ball">---</div>
            </div>

            <!-- የመጠበቂያ መልዕክት -->
            <div class="status-screen">
                <div class="status-title">WATCHING ONLY</div>
                <div class="status-desc" id="dynamic-status">የዚህ ዙር ጨዋታ ተጀምሯል። አዲስ ዙር እስኪጀምር እዚህ ይጠብቁ::</div>
            </div>
        </div>
    </div>

    <!-- 🔘 የታችኛው አዝራሮች -->
    <div class="bottom-actions">
        <button class="btn-act btn-leave" onclick="closeApp()">LEAVE</button>
        <button class="btn-act btn-refresh" onclick="location.reload()">REFRESH</button>
        <button class="btn-act btn-watch" id="status-btn" disabled>WATCHING</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();

        // 1-75 ማትሪክስ መደርደሪያ ሎጂክ (ልክ እንደ ምስሉ በአምድ አቀማመጥ)
        const board = document.getElementById('grid-board');
        for (let row = 0; row < 15; row++) {
            for (let col = 0; col < 5; col++) {
                let num = (col * 15) + row + 1;
                const cell = document.createElement('div');
                cell.className = 'num-cell';
                cell.id = 'cell-' + num;
                cell.innerText = num;
                board.appendChild(cell);
            }
        }

        // 🔄 ከፓይተን ሰርቨር መረጃዎችን በየሰከንዱ ተቀብሎ በቀጥታ (Live) ማሳያ ሎጂክ
        function updateLiveState() {
            fetch('/game-state') // የፓይተን API ሊንክህ
                .then(res => res.json())
                .then(data => {
                    document.getElementById('game-id').innerText = data.game_id;
                    document.getElementById('player-count').innerText = data.players;
                    document.getElementById('pool-amount').innerText = data.pool;
                    document.getElementById('called-count').innerText = data.called_list.length;

                    // ሁሉንም አብርቶ ማጥፋት
                    document.querySelectorAll('.num-cell').forEach(c => c.classList.remove('called'));

                    // የወጡትን ቁጥሮች በሙሉ በቦርዱ ላይ ማብራት
                    data.called_list.forEach(num => {
                        const cell = document.getElementById('cell-' + num);
                        if(cell) cell.classList.add('called');
                    });

                    // ትልቁን የአሁኑን ኳስ ማሳየት
                    if(data.called_list.length > 0) {
                        let lastNum = data.called_list[data.called_list.length - 1];
                        document.getElementById('current-big-ball').innerText = getLetter(lastNum) + "-" + lastNum;
                    } else {
                        document.getElementById('current-big-ball').innerText = "---";
                    }

                    // የታሪክ 4 ኳሶችን ማሳየት
                    const historyContainer = document.getElementById('history-container');
                    historyContainer.innerHTML = '';
                    let history = data.called_list.slice(-5, -1).reverse();
                    for(let i=0; i<4; i++) {
                        const hBall = document.createElement('div');
                        hBall.className = 'ball-history';
                        if(history[i]) {
                            hBall.innerText = getLetter(history[i]) + "-" + history[i];
                        } else {
                            hBall.innerText = "-";
                        }
                        historyContainer.appendChild(hBall);
                    }

                    // የጨዋታውን ሁኔታ ማሳያ
                    if(data.is_running) {
                        document.getElementById('dynamic-status').innerText = "የዚህ ዙር ጨዋታ ተጀምሯል። አዲስ ዙር እስኪጀምር እዚህ ይጠብቁ::";
                    } else {
                        document.getElementById('dynamic-status').innerText = "ቀጣዩ ዙር በቅርቡ ይጀምራል... በመጠባበቅ ላይ ነዎት።";
                    }
                }).catch(() => {});
        }

        function getLetter(num) {
            if(num <= 15) return 'B';
            if(num <= 30) return 'I';
            if(num <= 45) return 'N';
            if(num <= 60) return 'G';
            return 'O';
        }

        setInterval(updateLiveState, 1500); // በየ 1.5 ሰከንድ መረጃውን ያድሳል
        updateLiveState();

        function closeApp() { tg.close(); }
    </script>
</body>
</html>
