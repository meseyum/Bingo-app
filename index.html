<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ቅዳሜ ቢንጎ - Saturday Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b092b; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; }
        
        /* የላይኛው የባነር ክፍል */
        .header-banner { background-color: #e74c3c; color: white; padding: 12px; font-weight: bold; border-radius: 8px; margin-bottom: 15px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* የዋሌት መረጃዎች ማሳያ (ልክ በፎቶው ላይ እንዳለው) */
        .info-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .info-box { background-color: #1a164d; border: 1px solid #2a2475; padding: 10px 5px; border-radius: 8px; font-size: 11px; }
        .info-box .title { color: #8b87bd; font-size: 10px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .info-box .value { color: #f1c40f; font-weight: bold; font-size: 13px; }

        /* ዋናው የቁጥሮች መምረጫ ሰሌዳ */
        .board-title { color: #f1c40f; font-weight: bold; margin-bottom: 15px; font-size: 16px; }
        .bingo-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; background-color: #07051c; padding: 12px; border-radius: 12px; border: 2px solid #1a164d; box-shadow: inset 0 0 15px rgba(0,0,0,0.6); }
        
        /* የቁልፎቹ መደበኛ ቀለም (ብርቱካናማ) */
        .num-btn { background: #d35400; color: white; border: none; padding: 12px 0; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        
        /* ቁጥሩ ሲመረጥ የሚሆንበት ቀለም (ቢጫ ከለር) */
        .num-btn.selected { background: #f1c40f !important; color: #000000 !important; box-shadow: 0 0 10px #f1c40f; }
        
        /* የታችኛው አረጋግጫለሁ ቁልፍ */
        .action-container { margin-top: 25px; padding: 0 10px; }
        .confirm-btn { width: 100%; background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
        .confirm-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header-banner">
        📢 የጨዋታውን የአማርኛ ድምፅ ለመስማት ይህንን ይጫኑ!
    </div>

    <div class="info-container">
        <div class="info-box">
            <div class="title">MAIN WALLET</div>
            <div class="value" id="main-balance">100 ብር</div>
        </div>
        <div class="info-box">
            <div class="title">PLAYERS</div>
            <div class="value">1</div>
        </div>
        <div class="info-box">
            <div class="title">PLAY WALLET</div>
            <div class="value">0 ብር</div>
        </div>
        <div class="info-box">
            <div class="title" style="color: #f1c40f;">NEXT ROUND</div>
            <div class="value" style="font-size: 10px; color: #ffffff;">በሂደት ላይ...</div>
        </div>
    </div>

    <div class="board-title">እባክዎ መጫወቻ ካርታ ይምረጡ (1-100) 👇</div>

    <div class="bingo-grid" id="bingo-board"></div>

    <div class="action-container">
        <button class="confirm-btn" id="confirm-selection">ምርጫዬን አረጋግጣለሁ</button>
    </div>

    <script>
        // የቴሌግራም ዌብ አፕን ማስጀመር
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // ሙሉ ስክሪን እንዲሆን ማድረግ

        // ከቦቱ የመጣውን ባላንስ ማንበቢያ
        const urlParams = new URLSearchParams(window.location.search);
        const currentBal = urlParams.get('balance') || '100';
        document.getElementById('main-balance').innerText = currentBal + " ብር";

        let selectedNumbers = [];
        const board = document.getElementById('bingo-board');

        // 1-100 ቁጥሮችን በቦርዱ ላይ መፍጠር
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            
            btn.onclick = () => {
                const index = selectedNumbers.indexOf(i);
                if (index > -1) {
                    // ከተመረጠ መልሰህ አውጣው (ከለሩን አጥፋው)
                    selectedNumbers.splice(index, 1);
                    btn.classList.remove('selected');
                } else {
                    // ቢበዛ 10 ቁጥር ብቻ እንዲመርጡ መገደብ
                    if (selectedNumbers.length >= 10) {
                        alert("በአንድ ዙር ከ 10 ቁጥር በላይ መምረጥ አይቻልም!");
                        return;
                    }
                    selectedNumbers.push(i);
                    btn.classList.add('selected'); // ሲመረጥ ቢጫ ማድረግ
                }
            };
            board.appendChild(btn);
        }

        // 🚀 "ምርጫዬን አረጋግጣለሁ" ሲነካ የሚሰራው አስተማማኝ የቴሌግራም API መላኪያ
        document.getElementById('confirm-selection').onclick = function() {
            if (selectedNumbers.length === 0) {
                alert("እባክዎ መጀመሪያ ቢያንስ 1 ቁጥር ይምረጡ!");
                return;
            }

            // የእርስዎ ቦት ቶከን
            const botToken = "8836060939:AAFoUFgghWNxK-Hmrc9Q5jo4aPsSvxd4nIM";
            const userId = tg.initDataUnsafe?.user?.id;

            if (!userId) {
                alert("የቴሌግራም ID ማግኘት አልተቻለም! እባክዎ ከቦቱ ውስጥ ይክፈቱት።");
                return;
            }

            // ዳታውን በ HTTPS ሪኩዌስት በቀጥታ ለቦቱ መላክ (ይህ ሲሆን ጨዋታው በጭራሽ አይዘጋም)
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: userId,
                    text: `🎰 BINGO_DATA:${JSON.stringify({ marked_numbers: selectedNumbers })}`
                })
            })
            .then(res => {
                if (res.ok) {
                    tg.close(); // መረጃው በተሳካ ሁኔታ ሲላክ ዌብ አፑን ይዘጋዋል
                } else {
                    alert("የመረጡትን መላክ አልተቻለም፣ እባክዎ እንደገና ይሞክሩ።");
                }
            })
            .catch(err => {
                alert("የኔትወርክ ስህተት ተፈጥሯል: " + err);
            });
        };
    </script>
</body>
</html>
