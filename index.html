<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo2026 Roulette</title>
    <!-- የቴሌግራም ሚኒ አፕ ስክሪፕት -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .header {
            margin-bottom: 20px;
        }
        .balance-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        /* የሚሽከረከረው ገበታ ዲዛይን */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 30px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #gold;
            background: conic-gradient(
                #e74c3c 0deg 45deg, #2c3e50 45deg 90deg,
                #e74c3c 90deg 135deg, #2c3e50 135deg 180deg,
                #e74c3c 180deg 225deg, #2c3e50 225deg 270deg,
                #e74c3c 270deg 315deg, #27ae60 315deg 360deg
            );
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.1, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #f1c40f;
            z-index: 10;
        }
        /* የውርርድ በተኖች */
        .bet-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-red { background-color: #e74c3c; color: white; }
        .btn-black { background-color: #2c3e50; color: white; }
        .btn-green { background-color: #27ae60; color: white; }
        .btn:active { transform: scale(0.95); }
        
        .spin-btn {
            background: linear-gradient(45deg, #f1c40f, #f39c12);
            color: #1f1c2c;
            font-size: 20px;
            padding: 15px 40px;
            margin-top: 25px;
            width: 80%;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>👑 SuperBingo2026 Roulette</h2>
        <div class="balance-container">💰 ባላንስ: <span id="balance">500.00</span> ETB</div>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <p>ለመወራረድ የሚፈልጉትን ቀለም ይምረጡ፦</p>
    <div class="bet-buttons">
        <button class="btn btn-red" onclick="selectColor('red')">🔴 ቀይ (2x)</button>
        <button class="btn btn-black" onclick="selectColor('black')">⚫ ጥቁር (2x)</button>
        <button class="btn btn-green" onclick="selectColor('green')">🟢 አረንጓዴ (5x)</button>
    </div>
    <p id="selected-info" style="color: #f1c40f; font-weight: bold; margin-top: 10px;"></p>

    <button class="btn spin-btn" onclick="spinWheel()">🎡 ገበታውን አሽከርክር</button>

    <div class="result" id="result-display"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // ጌሙን በሙሉ ስክሪን ይከፍተዋል

        let currentBalance = 500.00;
        let selectedColor = null;
        let isSpinning = false;

        function selectColor(color) {
            if(isSpinning) return;
            selectedColor = color;
            let colorText = color === 'red' ? '🔴 ቀይ' : color === 'black' ? '⚫ ጥቁር' : '🟢 አረንጓዴ';
            document.getElementById('selected-info').innerText = "የተመረጠው ቀለም: " + colorText + " (ውርርድ: 50 ETB)";
        }

        function spinWheel() {
            if (isSpinning) return;
            if (!selectedColor) {
                alert("እባክዎ መጀመሪያ ቀለም ይምረጡ!");
                return;
            }
            if (currentBalance < 50) {
                alert("በቂ ባላንስ የለዎትም!");
                return;
            }

            isSpinning = true;
            currentBalance -= 50; // የ 50 ብር ውርርድ ይቆርጣል
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
            document.getElementById('result-display').innerText = "ገበታው እየተሽከረከረ ነው... 🎰";

            let wheel = document.getElementById('wheel');
            // የዘፈቀደ ዲግሪ ማሽከርከሪያ (ቢያንስ 5 ዙር እንዲዞር)
            let randomDegree = Math.floor(Math.random() * 360) + 1800; 
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            setTimeout(() => {
                isSpinning = false;
                let actualDegree = randomDegree % 360;
                let winningColor = 'red';

                // ዲግሪውን መሰረት በማድረግ ቀለሙን መለየት
                if (actualDegree >= 0 && actualDegree < 45) winningColor = 'red';
                else if (actualDegree >= 45 && actualDegree < 90) winningColor = 'black';
                else if (actualDegree >= 90 && actualDegree < 135) winningColor = 'red';
                else if (actualDegree >= 135 && actualDegree < 180) winningColor = 'black';
                else if (actualDegree >= 180 && actualDegree < 225) winningColor = 'red';
                else if (actualDegree >= 225 && actualDegree < 270) winningColor = 'black';
                else if (actualDegree >= 270 && actualDegree < 315) winningColor = 'red';
                else winningColor = 'green';

                // አሸናፊውን ማሳወቅ
                if (selectedColor === winningColor) {
                    let multiplier = winningColor === 'green' ? 5 : 2;
                    let winAmount = 50 * multiplier;
                    currentBalance += winAmount;
                    document.getElementById('result-display').innerHTML = `<span style="color: #27ae60;">🎉 አሸነፉ! +${winAmount} ETB አገኙ!</span>`;
                } else {
                    document.getElementById('result-display').innerHTML = `<span style="color: #e74c3c;">😢 አልተሳካም! የወጣው ቀለም ${winningColor === 'red' ? '🔴' : winningColor === 'black' ? '⚫' : '🟢'} ነበር።</span>`;
                }
                
                document.getElementById('balance').innerText = currentBalance.toFixed(2);
                selectedColor = null;
                document.getElementById('selected-info').innerText = "";
            }, 4000); // ከ 4 ሰከንድ በኋላ ገበታው ይቆማል
        }
    </script>
</body>
</html>
