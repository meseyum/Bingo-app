<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo 2026 - 5x5 Matrix Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #120e24;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 80px;
            user-select: none;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* የላይኛው መረጃ ሰሌዳ */
        .status-header {
            display: flex;
            justify-content: space-between;
            background: #1a1535;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            border: 1px solid #2b2354;
        }
        .status-header span { color: #8a81b3; font-size: 11px; display: block; }

        /* 1-100 ዋናው ቁጥር መምረጫ ሰሌዳ */
        .grid-100 {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: #1a1535;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 12px;
            max-height: 220px;
            overflow-y: auto;
        }
        .cell {
            background: #251f47;
            font-size: 11px;
            font-weight: bold;
            padding: 8px 0;
            text-align: center;
            border-radius: 4px;
            color: #a299cc;
            cursor: pointer;
        }
        .cell.selected-by-user { background: #00ffcc !important; color: #120e24 !important; font-weight: bold; }
        .cell.called { background: #d84b16 !important; color: #fff; }
        .cell.last { background: #ffcc00 !important; color: #120e24; box-shadow: 0 0 8px #ffcc00; }

        /* 🎰 የ 5x5 የቢንጎ ማትሪክስ ዳሽቦርድ (Cartel Dashboard) */
        .matrix-container {
            background: #1e183c;
            padding: 15px;
            border-radius: 14px;
            border: 2px solid #362c6b;
            margin-top: 10px;
        }
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .matrix-cell {
            background: #ffffff;
            color: #120e24;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 0;
            text-align: center;
            border-radius: 8px;
            box-shadow: inset 0 -3px 0 #ddd;
            transition: all 0.2s ease;
        }
        .matrix-cell.star { background: #ffcc00 !important; color: #120e24; box-shadow: inset 0 -3px 0 #ccaa00; }
        .matrix-cell.match { background: #20c997 !important; color: #fff !important; box-shadow: inset 0 -3px 0 #179b71 !important; transform: scale(0.95); }
        .matrix-cell.empty { background: #251f47; color: #4e4475; border: 2px dashed #362c6b; box-shadow: none; }

        /* አዝራሮች */
        .btn {
            background: #d84b16; color: white; border: none; padding: 14px;
            width: 100%; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px;
        }
        .btn-sec { background: #251f47; color: #00ffcc; border: 1px solid #00ffcc; }
        .input-field {
            width: 100%; padding: 12px; background: #1a1535; border: 1px solid #362c6b;
            border-radius: 8px; color: white; margin-bottom: 12px; box-sizing: border-box; font-size: 14px;
        }

        /* የታችኛው ማውጫ */
        .footer-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: #0d0a1a;
            display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #1a1535;
        }
        .nav-item { text-align: center; color: #726999; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: #00ffcc; }
    </style>
</head>
<body>

    <!-- 1. የጨዋታ ገጽ -->
    <div id="game-tab" class="tab-content active">
        <div class="status-header">
            <div><span>ዋና ሂሳብ</span><div id="status-bal" style="color:#20c997;">0.00 ብር</div></div>
            <div><span>ቀሪ ሰከንድ</span><div id="status-timer" style="color:#ffcc00;">20 s</div></div>
            <div><span>ሁኔታ</span><div id="status-text">እረፍት (ቁጥር ይምረጡ)</div></div>
        </div>

        <div style="font-size: 12px; color: #00ffcc; margin-bottom: 8px; text-align: center; font-weight: bold;" id="select-info">
            💡 እባክዎ ከታች ካለው ሰሌዳ 24 ቁጥሮችን በመንካት የ 5x5 ማትሪክስዎን ይሙሉ!
        </div>
        
        <!-- 1-100 ዋናው ምርጫ ሰሌዳ -->
        <div class="grid-100" id="bingo-board"></div>

        <!-- 🎰 የ 5x5 የካርቴላ ዳሽቦርድ (Dashboard) -->
        <div class="matrix-container">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight: bold; color: #ffcc00; font-size: 14px;" id="matrix-title">የእርስዎ ማትሪክስ ሰሌዳ (0/24)</span>
                <button class="btn btn-sec" style="width:auto; padding:8px 16px; margin:0;" id="buy-btn" onclick="lockAndPlay()">በ 10 ብር ይጫወቱ 🎰</button>
            </div>
            <div class="matrix-grid" id="matrix-grid-view"></div>
        </div>
    </div>

    <!-- 2. የዋሌት ገጽ -->
    <div id="wallet-tab" class="tab-content">
        <h3>💰 የኪስ ቦርሳ (Wallet)</h3>
        <div class="status-header" style="margin-bottom:20px;">
            <div><span>አጠቃላይ ቀሪ ሂሳብ</span><div id="wallet-bal-display" style="font-size:18px; color:#20c997;">0.00 ብር</div></div>
        </div>
        <h4>📥 ብር መሙያ (Deposit)</h4>
        <input type="number" id="dep-amount" class="input-field" placeholder="የሚሞላው ብር መጠን">
        <button class="btn" onclick="processWallet('deposit')">በቴሌብር/ባንክ ይሙሉ</button>
    </div>

    <!-- 3. የሪፈራል ገጽ -->
    <div id="ref-tab" class="tab-content">
        <h3>👥 ጓደኛ ይጋብዙ</h3>
        <input type="text" id="ref-link-input" class="input-field" readonly>
        <button class="btn btn-sec" onclick="copyRef()">ሊንኩን ኮፒ አድርግ</button>
    </div>

    <div class="footer-nav">
        <div class="nav-item active" id="nav-game" onclick="switchTab('game')">🎮<br>ጨዋታ</div>
        <div class="nav-item" id="nav-wallet" onclick="switchTab('wallet')">💼<br>ዋሌት</div>
        <div class="nav-item" id="nav-ref" onclick="switchTab('ref')">👥<br>ሪፈራል</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let userBalance = parseFloat(urlParams.get('balance')) || 100.00;
        const user = tg.initDataUnsafe.user || { id: 12345 };

        let selectedNumbers = []; 
        let hasCartel = false;
        let isPlaying = false;
        let timeLeft = 20;
        let pool = Array.from({length: 100}, (_, i) => i + 1);

        function updateBalanceUI() {
            document.getElementById('status-bal').innerText = userBalance.toFixed(2) + " ብር";
            document.getElementById('wallet-bal-display').innerText = userBalance.toFixed(2) + " ብር";
        }
        updateBalanceUI();

        // 1-100 ሰሌዳ መፍጠር
        const board = document.getElementById('bingo-board');
        function initBoard() {
            board.innerHTML = "";
            for (let i = 1; i <= 100; i++) {
                board.innerHTML += `<div class="cell" id="b-${i}" onclick="selectNumber(${i})">${i}</div>`;
            }
        }
        initBoard();

        // የ 5x5 ማትሪክስ ዳሽቦርድ መሳያ (Dynamic 5x5 Matrix)
        function updateMatrixDashboard() {
            const grid = document.getElementById('matrix-grid-view');
            grid.innerHTML = "";
            let numIdx = 0;

            for (let i = 0; i < 25; i++) {
                if (i === 12) {
                    // መሃል ላይ ያለችው ነፃ ስጦታ (⭐ Free Star)
                    grid.innerHTML += `<div class="matrix-cell star">⭐</div>`;
                } else {
                    let currentNum = selectedNumbers[numIdx] || "";
                    if (currentNum !== "") {
                        grid.innerHTML += `<div class="matrix-cell" id="c-${currentNum}">${currentNum}</div>`;
                        numIdx++;
                    } else {
                        grid.innerHTML += `<div class="matrix-cell empty">?</div>`;
                    }
                }
            }
            document.getElementById('matrix-title').innerText = `የማትሪክስ ሰሌዳ (${selectedNumbers.length}/24)`;
        }
        updateMatrixDashboard();

        // 👆 ተጫዋቹ ቁጥር ሲመርጥ ወደ 5x5 ዳሽቦርድ የሚጨምርበት ህግ
        window.selectNumber = function(num) {
            if (isPlaying || hasCartel) return;

            const cell = document.getElementById(`b-${num}`);
            if (selectedNumbers.includes(num)) {
                // ከተመረጠው ላይ መቀነስ
                selectedNumbers = selectedNumbers.filter(n => n !== num);
                cell.classList.remove('selected-by-user');
            } else {
                // እስከ 24 ቁጥር መሙላት
                if (selectedNumbers.length >= 24) {
                    alert("❌ መምረጥ የሚችሉት 24 ቁጥሮችን ብቻ ነው!");
                    return;
                }
                selectedNumbers.push(num);
                cell.classList.add('selected-by-user');
            }
            tg.HapticFeedback.impactOccurred('light');
            updateMatrixDashboard();
        }

        // 🎰 የ 10 ብር መቁረጫ እና ማትሪክስ መቆለፊያ ቁልፍ
        function lockAndPlay() {
            if (selectedNumbers.length < 24) {
                alert("❌ እባክዎ መጀመሪያ 24 ቁጥሮችን መርጠው የ 5x5 ማትሪክስዎን ይሙሉ!");
                return;
            }
            if (userBalance < 10) {
                alert("❌ ይቅርታ፣ ለመጫወት በቂ ሂሳብ የሎትም። እባክዎ መጀመሪያ ዋሌት ውስጥ ይሙሉ!");
                return;
            }
            if (hasCartel) return;

            userBalance -= 10;
            updateBalanceUI();
            hasCartel = true;

            document.getElementById('buy-btn').innerText = "✅ ማትሪክስ ተቆልፏል";
            document.getElementById('buy-btn').style.color = "#20c997";
            document.getElementById('select-info').innerText = "🔒 የእርስዎ 5x5 ማትሪክስ ተቆልፏል! የዕጣ ቁጥሮችን ይጠብቁ።";

            // መረጃውን ወደ ፓይተን መላክ
            tg.sendData(JSON.stringify({ action: "buy_cartel", user_id: user.id, cost: 10, choices: selectedNumbers }));
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
        }

        // ⏱️ የጨዋታ ጊዜ ቆጣሪ ሞተር (Real-time Game Loop)
        setInterval(() => {
            timeLeft--;
            document.getElementById('status-timer').innerText = timeLeft + " s";

            if (timeLeft <= 0) {
                if (!isPlaying) {
                    isPlaying = true;
                    timeLeft = 40; // የዕጣ ማውጫ ሰዓት
                    document.getElementById('status-text').innerText = "🔴 የቀጥታ ጨዋታ!";
                } else {
                    isPlaying = false;
                    timeLeft = 20; // አዲስ እረፍት እና ቁጥር መምረጫ ሰዓት
                    document.getElementById('status-text').innerText = "እረፍት (ቁጥር ይምረጡ)";
                    hasCartel = false;
                    selectedNumbers = [];
                    document.getElementById('buy-btn').innerText = "በ 10 ብር ይጫወቱ 🎰";
                    document.getElementById('buy-btn').style.color = "#00ffcc";
                    document.getElementById('select-info').innerText = "💡 እባክዎ ከታች ካለው ሰሌዳ 24 ቁጥሮችን በመንካት የ 5x5 ማትሪክስዎን ይሙሉ!";
                    initBoard();
                    updateMatrixDashboard();
                    pool = Array.from({length: 100}, (_, i) => i + 1);
                }
            }

            // 🎲 በየ 2 ሰከንዱ እጣ ማውጣት እና በ 5x5 ዳሽቦርድ ላይ ማመሳከር
            if (isPlaying && timeLeft > 2 && timeLeft % 2 === 0 && pool.length > 0) {
                let ballIdx = Math.floor(Math.random() * pool.length);
                let ball = pool[ballIdx];
                pool.splice(ballIdx, 1);

                document.querySelectorAll('.cell').forEach(c => c.classList.remove('last'));
                
                // 1-100 ቦርዱ ላይ ማሳየት
                let bCell = document.getElementById(`b-${ball}`);
                if (bCell) bCell.classList.add('called', 'last');

                // 🎰 በ 5x5 ማትሪክስ ዳሽቦርዱ ላይ ከተገኘ ማመሳሰል (Match ማድረግ)
                let cCell = document.getElementById(`c-${ball}`);
                if (cCell) {
                    cCell.classList.add('match');
                    tg.HapticFeedback.impactOccurred('medium');
                }
            }
        }, 1000);
    </script>
</body>
</html>
