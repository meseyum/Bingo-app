<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo 2026 - Real Cartel Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #161229;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 80px;
            user-select: none;
        }
        .header-box {
            display: flex;
            justify-content: space-between;
            background: #1f1a3a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 12px;
            text-align: center;
        }
        .header-box div span {
            display: block;
            color: #897fa6;
            font-size: 10px;
            margin-bottom: 3px;
        }
        .main-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: #1f1a3a;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .board-cell {
            background: #2a244d;
            font-size: 11px;
            font-weight: bold;
            padding: 8px 0;
            text-align: center;
            border-radius: 4px;
            color: #a59bcf;
        }
        .board-cell.called {
            background: #d84b16 !important;
            color: #fff !important;
            box-shadow: 0 0 5px #d84b16;
        }
        .board-cell.last-called {
            background: #00ffcc !important;
            color: #161229 !important;
            box-shadow: 0 0 8px #00ffcc;
        }

        /* 🎰 የቢንጎ ተጫዋች ካርቴላ (Cartel) ዲዛይን */
        .cartel-container {
            background: #231d42;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #3d336b;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .cartel-title {
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            font-size: 13px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .cartel-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .cartel-cell {
            background: #ffffff;
            color: #1d183a;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 0;
            text-align: center;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .cartel-cell.star {
            background: #ffcc00 !important;
            color: #161229 !important;
            font-size: 18px;
        }
        /* እጣው ሲወጣ ካርቴላው ላይ በራሱ አረንጓዴ ሆኖ የሚበራው ህግ */
        .cartel-cell.matched {
            background: #20c997 !important;
            color: #ffffff !important;
            box-shadow: 0 0 8px #20c997;
            transform: scale(1.02);
        }

        .status-bar {
            background: #1f1a3a;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <div class="header-box">
        <div><span>WALLET</span><div style="color: #20c997;" id="wallet-val">5000 ብር</div></div>
        <div><span>BET</span><div>10</div></div>
        <div><span>TIME LEFT</span><div style="color: #ffcc00;" id="timer-val">35 s</div></div>
        <div><span>ROUND</span><div id="round-val">SuperBingo2026</div></div>
    </div>

    <div class="main-board" id="bingo-main-board"></div>

    <div class="cartel-container">
        <div class="cartel-title" id="cartel-id">CARTEL #--</div>
        <div class="cartel-grid" id="player-cartel-grid"></div>
    </div>

    <div class="status-bar" id="game-status-text">🎰 በመጫወት ላይ...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. 1-100 ዋናውን ሰሌዳ መገንባት
        const mainBoard = document.getElementById('bingo-main-board');
        function initMainBoard() {
            mainBoard.innerHTML = "";
            for (let i = 1; i <= 100; i++) {
                mainBoard.innerHTML += `<div class="board-cell" id="b-cell-${i}">${i}</div>`;
            }
        }
        initMainBoard();

        // 2. ለተጫዋቹ የራሱ የሆነ የካርቴላ ቁጥሮችን በራሱ ጊዜ ማመንጨት (5x5)
        const cartelGrid = document.getElementById('player-cartel-grid');
        let cartelNumbers = [];
        
        function generateCartel() {
            cartelGrid.innerHTML = "";
            let uniqueNums = new Set();
            while(uniqueNums.size < 24) {
                uniqueNums.add(Math.floor(Math.random() * 100) + 1);
            }
            cartelNumbers = Array.from(uniqueNums);
            
            // የዘፈቀደ የካርቴላ ቁጥር መለያ መስጠት
            document.getElementById('cartel-id').innerText = "CARTEL #" + (Math.floor(Math.random() * 900) + 100);

            let index = 0;
            for (let i = 0; i < 25; i++) {
                if (i === 12) {
                    // መሃል ላይ የምትገኘው ኮከብ (FREE SPACE ⭐)
                    cartelGrid.innerHTML += `<div class="cartel-cell star">⭐</div>`;
                } else {
                    let num = cartelNumbers[index++];
                    cartelGrid.innerHTML += `<div class="cartel-cell" id="c-cell-${num}">${num}</div>`;
                }
            }
        }
        generateCartel();

        // 3. 🎰 አውቶማቲክ የጨዋታ ሞተር ህግ
        let timeLeft = 35;
        let pool = Array.from({length: 100}, (_, i) => i + 1);
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }
        shuffle(pool);

        function speakAmharic(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'am-ET';
                window.speechSynthesis.speak(utterance);
            }
        }

        const gameEngine = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-val').innerText = timeLeft + " s";

            // በየ 1.5 ሰከንዱ ቁጥር ማውጣት
            if (timeLeft > 5 && timeLeft % 2 === 0 && pool.length > 0) {
                let currentBall = pool.pop();
                
                // የድሮ የመጨረሻ ቁጥር ምልክትን ማጥፋት
                document.querySelectorAll('.board-cell').forEach(c => c.classList.remove('last-called'));
                
                // 1. ዋናው ሰሌዳ ላይ በቀይ ማብራት
                const mainCell = document.getElementById(`b-cell-${currentBall}`);
                if (mainCell) mainCell.classList.add('called', 'last-called');
                
                // 2. ማረጋገጫ፡ የወጣው ቁጥር በተጫዋቹ ካርቴላ ላይ ካለ በራሱ አረንጓዴ ያደርገዋል!
                const cartelCell = document.getElementById(`c-cell-${currentBall}`);
                if (cartelCell) {
                    cartelCell.classList.add('matched');
                    tg.HapticFeedback.impactOccurred('medium'); // ስልኩን እረገጥ ያደርገዋል
                }

                speakAmharic("ቁጥር " + currentBall);
            }

            // ዙር ሲያልቅ በራሱ አዲስ ካርቴላ እና አዲስ ዙር መጀመር
            if (timeLeft <= 0) {
                timeLeft = 35;
                shuffle(pool);
                initMainBoard();
                generateCartel(); // አዲስ ካርቴላ መስጠት
                speakAmharic("ቢንጎ! አዲስ ዙር ተጀመረ");
            }
        }, 1000);
    </script>
</body>
</html>
