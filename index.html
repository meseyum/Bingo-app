<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Board Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121032; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .wallet-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .wallet-box { background-color: #1B184B; padding: 10px; border-radius: 8px; border: 1px solid #2A247A; }
        .wallet-title { font-size: 10px; color: #8B88B4; font-weight: bold; }
        .wallet-value { font-size: 15px; font-weight: bold; color: #FFD700; margin-top: 5px; }
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; background-color: #0A0824; padding: 10px; border-radius: 12px; }
        .tile { background-color: #D35400; border: none; color: white; padding: 12px 0; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .tile.selected { background-color: #FFD700; color: #121032; font-weight: bold; }
        .status-box { margin-top: 15px; background: #1B184B; padding: 12px; border-radius: 8px; font-size: 14px; color: #FFD700; }
        .submit-btn { width: 100%; background-color: #2ECC71; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; margin-top: 15px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div class="wallet-container">
        <div class="wallet-box"><div class="wallet-title">MAIN WALLET</div><div class="wallet-value">0 ብር</div></div>
        <div class="wallet-box"><div class="wallet-title">PLAYERS</div><div class="wallet-value">1</div></div>
        <div class="wallet-box"><div class="wallet-title">PLAY WALLET</div><div class="wallet-value">0 ብር</div></div>
    </div>

    <h3 style="margin-bottom: 10px;">እባክዎ መጫወቻ ካርታ ይምረጡ (1-100)</h3>
    
    <div class="grid-container" id="bingo-grid"></div>

    <div class="status-box" id="status-display">የተመረጠ ካርታ የለም</div>
    
    <button class="submit-btn" id="confirm-selection-btn" onclick="sendDataToBot()">🎯 ምርጫዬን አረጋግጥ (Confirm)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const grid = document.getElementById('bingo-grid');
        const statusDisplay = document.getElementById('status-display');
        const submitBtn = document.getElementById('confirm-selection-btn');
        let selectedNumbers = [];

        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.className = 'tile';
            btn.innerText = i;
            
            btn.onclick = () => {
                if (btn.classList.contains('selected')) {
                    btn.classList.remove('selected');
                    selectedNumbers = selectedNumbers.filter(num => num !== i);
                } else {
                    if (selectedNumbers.length >= 5) {
                        alert("በአንድ ጊዜ 5 ቁጥር ብቻ መምረጥ ይችላሉ!");
                        return;
                    }
                    btn.classList.add('selected');
                    selectedNumbers.push(i);
                }
                
                if (selectedNumbers.length > 0) {
                    statusDisplay.innerText = `የመረጧቸው ካርታዎች: ${selectedNumbers.sort((a,b)=>a-b).join(', ')}`;
                    submitBtn.style.display = "block"; // Show button
                } else {
                    statusDisplay.innerText = "የተመረጠ ካርታ የለም";
                    submitBtn.style.display = "none"; // Hide button
                }
            };
            grid.appendChild(btn);
        }

        function sendDataToBot() {
            if (selectedNumbers.length === 0) return;
            
            // Send selected array back to Python bot securely
            const payload = JSON.stringify({ "selected_cards": selectedNumbers });
            tg.sendData(payload);
            
            // Automatically close the window after clicking
            tg.close();
        }
    </script>
</body>
</html>
