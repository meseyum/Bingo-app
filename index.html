<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo 2026 - Ultra Smooth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1a1530;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 12px;
            padding-bottom: 80px;
            user-select: none;
            -webkit-user-select: none;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .nav-btn {
            background: #2e264f;
            border: none;
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: #231b42;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
        }
        .stat-box span {
            display: block;
            color: #897fa6;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .stat-box div {
            font-size: 15px;
            font-weight: bold;
        }
        .timer-highlight {
            color: #ffcc00 !important;
            font-size: 17px !important;
        }
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            background: #231b42;
            padding: 14px;
            border-radius: 14px;
        }
        .num-cell {
            background: #2e264f;
            border-radius: 8px;
            padding: 12px 0;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            color: #c9c1e6;
            transition: all 0.2s ease;
        }
        /* የወጡ ቁጥሮች ቀይ የሚሆኑበት */
        .num-cell.called {
            background: #d84b16 !important;
            color: #ffffff !important;
            transform: scale(1.05);
            box-shadow: 0 0 10px #d84b16;
        }
        /* የመጨረሻው የወጣው ቁጥር ምልክት */
        .num-cell.last-called {
            background: #ffcc00 !important;
            color: #1a1530 !important;
            box-shadow: 0 0 15px #ffcc00;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #150f26;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid #2e264f;
        }
        .menu-item {
            text-align: center;
            color: #897fa6;
            font-size: 11px;
            flex: 1;
        }
        .menu-item.active { color: #00ffcc; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="nav-btn" onclick="Telegram.WebApp.close()">⬅ Back</button>
        <button class="nav-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>

    <div class="stats-row">
        <div class="stat-box"><span>Main Wallet</span><div id="main-wallet">2500</div></div>
        <div class="stat-box"><span>Play Wallet</span><div id="play-wallet">0</div></div>
        <div class="stat-box"><span>Stake</span><div>10</div></div>
        <div class="stat-box"><span>Time Left</span><div id="timer" class="timer-highlight">35 s</div></div>
    </div>

    <div class="numbers-grid" id="bingo-board"></div>

    <div class="bottom-nav">
        <div class="menu-item active">🎮<br>GAME</div>
        <div class="menu-item">🏆<br>SCORES</div>
        <div class="menu-item">🕒<br>HISTORY</div>
        <div class="menu-item">💼<br>WALLET</div>
        <div class="menu-item">👤<br>PROFILE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1-88 ሰሌዳ መገንባት
        const board = document.getElementById('bingo-board');
        function buildBoard() {
            board.innerHTML = "";
            for (let i = 1; i <= 88; i++) {
                board.innerHTML += `<div class="num-cell" id="cell-${i}">${i}</div>`;
            }
        }
        buildBoard();

        // ሂሳብ ማስተካከል
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('main-wallet').innerText = urlParams.get('balance') || "2500";
        document.getElementById('play-wallet').innerText = urlParams.get('play_wallet') || "0";

        // 🔊 🇪🇹 እጅግ ፈጣን የአማርኛ ድምፅ ማጉያ (ያለ ኢንተርኔት የሚሰራ)
        function speakAmharic(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'am-ET'; // አማርኛ
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        // 🎰 የጨዋታው አውቶማቲክ ሞተር
        let timeLeft = 35;
        let pool = Array.from({length: 88}, (_, i) => i + 1);
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }
        shuffle(pool);

        const engine = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + " s";

            // በየ 1.5 ሰከንዱ ቁጥር መጥራት
            if (timeLeft > 5 && timeLeft % 2 === 0 && pool.length > 0) {
                let currentBall = pool.pop();
                
                // ሁሉንም ነባር የመጨረሻ ቁጥሮች ማጽዳት
                document.querySelectorAll('.num-cell').forEach(c => c.classList.remove('last-called'));
                
                const cell = document.getElementById(`cell-${currentBall}`);
                if (cell) {
                    cell.classList.add('called', 'last-called');
                }
                
                // ድምፅ ማሰማት
                speakAmharic("ቁጥር " + currentBall);
            }

            // ዙር ማለቂያ ህግ
            if (timeLeft <= 0) {
                timeLeft = 35;
                shuffle(pool);
                buildBoard();
                speakAmharic("አዲስ ዙር ተጀምሯል");
            }
        }, 1000);
    </script>
</body>
</html>
