<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturday Bingo Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0c0827;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        /* 1. የላይኛው አራት ሳጥኖች (Top Status Grid) */
        .status-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .status-box {
            background-color: #171142;
            padding: 8px 3px;
            border-radius: 5px;
            font-size: 11px;
            border: 1px solid #231b5d;
        }
        .status-title {
            color: #7b75a6;
            font-weight: bold;
            font-size: 10px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .status-value {
            color: #00ffcc;
            font-weight: bold;
            font-size: 12px;
        }
        .status-value.yellow { color: #ffcc00; }
        .status-value.green { color: #2ecc71; }

        /* 2. የቀይ ድምፅ ማስታወቂያ ባር */
        .audio-bar {
            background-color: #c0392b;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* 3. የመካከለኛው ክፍል (የቢንጎ ሰሌዳ እና አውቶማቲክ ጎን ለጎን) */
        .main-game-area {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* የ B-I-N-G-O ሰሌዳ */
        .bingo-board {
            background-color: #08051a;
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #1c1549;
        }
        .bingo-header-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .bingo-letter {
            padding: 5px 0;
            border-radius: 3px;
            font-size: 14px;
            color: white;
        }
        .b-letter { background-color: #d35400; }
        .i-letter { background-color: #2980b9; }
        .n-letter { background-color: #c0392b; }
        .g-letter { background-color: #27ae60; }
        .o-letter { background-color: #8e44ad; }

        .bingo-numbers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }
        .bingo-cell {
            background-color: #1a1540;
            color: #5c558c;
            font-size: 11px;
            padding: 6px 0;
            border-radius: 2px;
            font-weight: bold;
        }
        .bingo-cell.called {
            background-color: #ffcc00;
            color: #000000;
        }

        /* የመካከለኛው ቀኝ ክፍል (AUTO controls) */
        .side-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #08051a;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #1c1549;
        }
        .section-label {
            color: #ffcc00;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .auto-status-box {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .auto-indicator-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }
        .called-count {
            color: #7b75a6;
            font-size: 12px;
        }

        /* 4. የታችኛው የ 1-100 ቁጥሮች መምረጫ ሰሌዳ */
        .selection-title {
            color: #ffcc00;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .numbers-board-100 {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background-color: #08051a;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #1c1549;
            max-height: 220px;
            overflow-y: auto;
        }
        .num-selection-btn {
            background-color: #d35400;
            color: white;
            border: none;
            padding: 8px 0;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .num-selection-btn.active {
            background-color: #ffcc00;
            color: #000000;
            box-shadow: 0 0 5px #ffcc00;
        }

        /* ምርጫ አረጋግጥ ቁልፍ */
        .confirm-action-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="status-box">
            <div class="status-title">WALLET</div>
            <div class="status-value yellow" id="wallet-bal">0 ብር</div>
        </div>
        <div class="status-box">
            <div class="status-title">PLAYERS</div>
            <div class="status-value" id="player-count">0</div>
        </div>
        <div class="status-box">
            <div class="status-title">ፌራሽ</div>
            <div class="status-value green" id="ferash-bal">0 ብር</div>
        </div>
        <div class="status-box">
            <div class="status-title">ROUND</div>
            <div class="status-value" id="round-status" style="font-size: 9px; color: #ffcc00;">በቂ ተጫዋች እየተጠባበቀ ነው...</div>
        </div>
    </div>

    <div class="audio-bar">
        📢 የአማርኛ ድምፅ ለመስማት ይጫኑ!
    </div>

    <div class="main-game-area">
        <div class="bingo-board">
            <div class="bingo-header-row">
                <div class="bingo-letter b-letter">B</div>
                <div class="bingo-letter i-letter">I</div>
                <div class="bingo-letter n-letter">N</div>
                <div class="bingo-letter g-letter">G</div>
                <div class="bingo-letter o-letter">O</div>
            </div>
            <div class="bingo-numbers-grid" id="bingo-matrix">
                </div>
        </div>

        <div class="side-controls">
            <div class="section-label">ካርታ ይምረጡ 👇</div>
            <div class="auto-status-box">
                <button class="auto-indicator-btn" id="auto-btn">🤖 AUTO</button>
            </div>
            <div class="called-count" id="called-counter">የተጠራ: 0</div>
        </div>
    </div>

    <div class="selection-title">🎫 የካርድ ቁጥር ይምረጡ (1-100)</div>
    <div class="numbers-board-100" id="selection-board-100"></div>

    <button class="confirm-action-btn" id="confirm-selection-btn">ምርጫዬን አረጋግጣለሁ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const bingoMatrix = document.getElementById('bingo-matrix');
        const selectionBoard = document.getElementById('selection-board-100');
        const confirmBtn = document.getElementById('confirm-selection-btn');
        const autoBtn = document.getElementById('auto-btn');

        let mySelectedNumbers = [];
        let isAutoModeOn = false;

        // 🤖 የቢንጎ ማትሪክስ መፍጠሪያ (ለአብነት ያህል የመጀመሪያዎቹን 35 ቁጥሮች እናስገባ)
        for (let i = 1; i <= 35; i++) {
            const cell = document.createElement('div');
            cell.className = 'bingo-cell';
            cell.innerText = i;
            // ለአብነት ያህል የተወሰኑትን "Called" (የተጠሩ) እናድርጋቸው
            if (i === 5 || i === 16 || i === 32) {
                cell.classList.add('called');
            }
            bingoMatrix.appendChild(cell);
        }

        // 🎫 የታችኛው የ 1-100 መጫወቻ ቁልፎች መፍጠሪያ
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-selection-btn';
            btn.innerText = i;

            btn.onclick = () => {
                if (isAutoModeOn) return;

                const idx = mySelectedNumbers.indexOf(i);
                if (idx > -1) {
                    mySelectedNumbers.splice(idx, 1);
                    btn.classList.remove('active');
                } else {
                    if (mySelectedNumbers.length >= 10) return; // ገደብ
                    mySelectedNumbers.push(i);
                    btn.classList.add('active');
                }
            };
            selectionBoard.appendChild(btn);
        }

        // 🤖 AUTO ማብሪያና ማጥፊያ ህግ
        autoBtn.onclick = () => {
            isAutoModeOn = !isAutoModeOn;
            if (isAutoModeOn) {
                autoBtn.style.backgroundColor = '#27ae60';
                autoBtn.innerText = "🤖 AUTO: ON";
                confirmBtn.style.display = 'none'; // አውቶማቲክ ሲሆን ቁልፉ ይጥፋ
            } else {
                autoBtn.style.backgroundColor = '#7f8c8d';
                autoBtn.innerText = "🤖 AUTO: OFF";
                confirmBtn.style.display = 'block'; // ሲጠፋ መልሶ ይውጣ
            }
        };

        // ማረጋገጫ ሲጫን ዳታ መላኪያ
        confirmBtn.onclick = () => {
            if (mySelectedNumbers.length === 0) {
                alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
                return;
            }
            tg.sendData(JSON.stringify({ marked_numbers: mySelectedNumbers }));
        };
    </script>
</body>
</html>
