    <div class="grid-container" id="bingo-grid"></div>
    
    <div class="status-box" id="status-display">የመረጡት ካርታዎች: ምንም አልተመረጠም</div>
    
    <div class="confirm-btn" onclick="sendNumbersAndClose()">የመረጡትን ያረጋግጡ (Confirm Selection)</div>

    <script>
        // Connect our page directly to the Telegram application layer
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let selectedCards = [];
        const gridContainer = document.getElementById('bingo-grid');
        const statusDisplay = document.getElementById('status-display');

        // Dynamically build your 1 to 100 buttons
        for (let i = 1; i <= 100; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = i;
            
            tile.addEventListener('click', () => {
                if (tile.classList.contains('selected')) {
                    tile.classList.remove('selected');
                    selectedCards = selectedCards.filter(num => num !== i);
                } else {
                    tile.classList.add('selected');
                    selectedCards.push(i);
                }
                
                if (selectedCards.length > 0) {
                    statusDisplay.innerText = `የመረጡት ካርታዎች: ${selectedCards.join(', ')}`;
                } else {
                    statusDisplay.innerText = "የመረጡት ካርታዎች: ምንም አልተመረጠም";
                }
            });
            
            gridContainer.appendChild(tile);
        }

        // THIS IS THE EXACT CODE THAT CLOSES THE PAGE AND GOES BACK
        function sendNumbersAndClose() {
            if (selectedCards.length === 0) {
                alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
                return;
            }

            // Package the data up 
            const dataPayload = JSON.stringify({ selected_cards: selectedCards });

            // CRITICAL: Send it to the bot and close the Web App layer instantly!
            tg.sendData(dataPayload);
        }
    </script>
</body>
</html>
