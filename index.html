<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER 2026 COIN WHEEL (FIXED)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #131927;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        .header {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .balance-container {
            background-color: #1c2538;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 15px 0;
            border: 1px solid #2c3a56;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-amount {
            color: #2ecc71;
            font-weight: bold;
        }
        .wheel-outer {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px 0;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #e74c3c;
            z-index: 10;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .section-title {
            font-size: 16px;
            margin: 15px 0 10px 0;
            color: #b2bec3;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 95%;
            max-width: 380px;
            margin-bottom: 15px;
        }
        .grid-20 {
            grid-template-columns: repeat(5, 1fr);
        }
        .btn {
            background-color: #1c2538;
            border: 1px solid #34495e;
            color: white;
            padding: 12px 2px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn.active {
            background-color: #f1c40f;
            color: #131927;
            box-shadow: 0 0 12px #f1c40f;
            border-color: #f1c40f;
        }
        .spin-btn {
            grid-column: span 5;
            background-color: #e74c3c;
            color: white;
            font-size: 18px;
            padding: 15px;
            margin-top: 10px;
            border: none;
            box-shadow: 0 5px 0 #c0392b;
        }
        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #c0392b;
        }
        .result-box {
            margin-top: 15px;
            padding: 12px;
            width: 85%;
            max-width: 340px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .win { background-color: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: #2ecc71; }
        .lose { background-color: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #e74c3c; }
    </style>
</head>
<body>

    <div class="header">🎡 SUPER 2026 COIN WHEEL 🕹️</div>
    
    <div class="balance-container">
        <span>💰 ባለንስዎ:</span>
        <span id="balance-display" class="balance-amount">95.00</span>
        <span>ETB</span>
    </div>

    <div class="wheel-outer">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div class="section-title">💵 የውርርድ መጠን ይምረጡ፦</div>
    <div class="grid-container">
        <div class="btn bet-btn active" onclick="selectBet(10, this)">10 ETB</div>
        <div class="btn bet-btn" onclick="selectBet(50, this)">50 ETB</div>
        <div class="btn bet-btn" onclick="selectBet(100, this).">100 ETB</div>
        <div class="btn bet-btn" onclick="selectBet(200, this)">200 ETB</div>
    </div>

    <div class="section-title">🎯 የሚወጣውን ቁጥር/ቀለም ይገምቱ (1-20)፦</div>
    <div class="grid-container grid-20" id="color-grid"></div>

    <div class="grid-container grid-20">
        <button class="btn spin-btn" onclick="spinWheel()">🎡 አሽከርክር (SPIN)</button>
    </div>

    <div id="result" class="result-box"></div>

    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if(tg) tg.expand(); 

        const urlParams = new URLSearchParams(window.location.search);
        let currentBalance = parseFloat(urlParams.get('balance')) || 95.00;

        document.getElementById('balance-display').innerText = currentBalance.toFixed(2);

        // 🎨 በፎቶው ላይ ያሉትን 10 ተደጋጋሚ ቀለማት ለ 20 ቁጥሮች ማደል
        const baseColors = ["#e74c3c", "#2c3e50", "#2980b9", "#f1c40f", "#2ecc71", "#9b59b6", "#e67e22", "#e84393", "#1abc9c", "#16a085"];
        const colorsData = [];
        for (let i = 1; i <= 20; i++) {
            colorsData.push({
                name: "ቁጥር " + i,
                hex: baseColors[(i - 1) % baseColors.length]
            });
        }

        let selectedBetAmount = 10;
        let selectedColorName = "";
        let isSpinning = false;
        let currentRotation = 0; // የተጠራቀመ ዲግሪ ለመያዝ

        const colorGrid = document.getElementById('color-grid');
        colorsData.forEach(c => { 
            const div = document.createElement('div');
            div.className = "btn color-btn";
            div.innerText = c.name.replace("ቁጥር ", "");
            div.style.backgroundColor = c.hex;
            div.onclick = function() { selectColor(c.name, this); };
            colorGrid.appendChild(div);
        });

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const numSegments = colorsData.length;
        const anglePerSegment = (2 * Math.PI) / numSegments;

        function drawWheel() {
            ctx.clearRect(0, 0, 500, 500);
            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(250, 250);
                // ዊሉ ሲሳል ከመሃል በላይ (ቀስቱ ካለበት -90 ዲግሪ) ጀምሮ እንዲሆን
                let startAngle = (i * anglePerSegment) - (Math.PI / 2);
                let endAngle = ((i + 1) * anglePerSegment) - (Math.PI / 2);
                
                ctx.arc(250, 250, 240, startAngle, endAngle);
                ctx.fillStyle = colorsData[i].hex;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#131927";
                ctx.stroke();

                // ቁጥሮቹን መጻፍ
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(startAngle + anglePerSegment / 2);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 16px Arial";
                ctx.textAlign = "right";
                ctx.fillText(colorsData[i].name.replace("ቁጥር ", ""), 220, 5);
                ctx.restore();
            }
        }
        drawWheel();

        function selectBet(amount, element) {
            if (isSpinning) return;
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            selectedBetAmount = amount;
        }

        function selectColor(colorName, element) {
            if (isSpinning) return;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            selectedColorName = colorName;
        }

        function spinWheel() {
            if (isSpinning) return;
            if (!selectedColorName) {
                alert("እባክዎ መጀመሪያ የሚገምቱትን ቁጥር ይምረጡ!");
                return;
            }
            if (currentBalance < selectedBetAmount) {
                alert("ይቅርታ፣ በቂ ባላንስ የለዎትም!");
                return;
            }

            isSpinning = true;
            currentBalance -= selectedBetAmount; 
            document.getElementById('balance-display').innerText = currentBalance.toFixed(2);

            const resultBox = document.getElementById('result');
            resultBox.style.display = "none";

            // 🎯 አስቀድመን አሸናፊውን ኢንዴክስ እንመርጣለን (0 እስከ 19)
            const winningIndex = Math.floor(Math.random() * numSegments);
            const winningColor = colorsData[winningIndex];

            // 🔄 በትክክል ቀስቱ ላይ እንዲቆም የሚያደርግ የዲግሪ ስሌት
            const segmentDegrees = 360 / numSegments;
            const targetDegrees = 360 - (winningIndex * segmentDegrees) - (segmentDegrees / 2);
            
            // የቆየውን ዙር ላይ ጨምረን 6 ሙሉ ዙር (2160 ዲግሪ) እናሽከረክረዋለን
            currentRotation = (Math.ceil(currentRotation / 360) * 360) + 2160 + targetDegrees;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;

                let isWin = (selectedColorName === winningColor.name);
                if (isWin) {
                    const winAmount = selectedBetAmount * 15; 
                    currentBalance += winAmount;
                    resultBox.className = "result-box win";
                    resultBox.innerHTML = `🎉 አሸንፈዋል!<br>የመረጡት: ${selectedColorName}<br>የወጣው: ${winningColor.name}<br>🎁 +${winAmount} ETB`;
                } else {
                    resultBox.className = "result-box lose";
                    resultBox.innerHTML = `💔 ተሸንፈዋል!<br>የመረጡት: ${selectedColorName}<br>የወጣው: ${winningColor.name}<br>📉 -${selectedBetAmount} ETB`;
                }

                document.getElementById('balance-display').innerText = currentBalance.toFixed(2);
                resultBox.style.display = "block";
                
                if (tg) {
                    tg.sendData(JSON.stringify({
                        status: isWin ? "win" : "lose",
                        chosen: selectedColorName,
                        rolled: winningColor.name,
                        new_balance: currentBalance
                    }));
                }

            }, 5000);
        }
    </script>
</body>
</html>
