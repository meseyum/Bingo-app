<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperBingo2026</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        .wallet-box {
            background-color: #1a1f2c;
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            border: 1px solid #2d3548;
        }
        .wallet-title {
            font-size: 11px;
            color: #8fa0c4;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .wallet-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00;
        }
        .instruction {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffffff;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            background-color: #07090e;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #1a1f2c;
            margin-bottom: 20px;
        }
        .number-btn {
            background-color: #d35400;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .number-btn.selected {
            background-color: #ffcc00;
            color: #000000;
            box-shadow: 0 0 10px #ffcc00;
        }
        .status-box {
            background-color: #10141d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #1a1f2c;
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00;
        }
        .confirm-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            width: 100%;
            padding: 15px 0;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="wallet-box">
            <div class="wallet-title">MAIN WALLET</div>
            <div class="wallet-value" id="main-balance">100 ብር</div>
        </div>
        <div class="wallet-box">
            <div class="wallet-title">PLAYERS</div>
            <div class="wallet-value">1</div>
        </div>
        <div class="wallet-box">
            <div class="wallet-title">PLAY WALLET</div>
            <div class="wallet-value">0 ብር</div>
        </div>
    </div>

    <div class="instruction">እባክዎ መጫወቻ ካርታ ይምረጡ (1-100)</div>
    <div class="grid-container" id="bingo-grid"></div>

    <div class="status-box">
        የመረጡት ካርታዎች: <span id="selected-list">ምንም አልተመረጠም</span>
    </div>

    <button class="confirm-btn" onclick="confirmTicket()">ምርጫዬን አረጋግጣለሁ (Confirm Ticket)</button>

    <script>
        // የቴሌግራም ዌብ አፕን በጃቫስክሪፕት ማገናኘት
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ቀሪ ሒሳብን ከቦቱ ተቀብሎ ማሳያ
        const urlParams = new URLSearchParams(window.location.search);
        const currentBalance = urlParams.get('balance') || "100";
        document.getElementById('main-balance').innerText = currentBalance + " ብር";

        let marked_numbers = [];
        const grid = document.getElementById('bingo-grid');

        // የቁጥሮች ሰሌዳ መፍጠሪያ
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.className = 'number-btn';
            btn.innerText = i;
            btn.onclick = () => toggleNumber(i, btn);
            grid.appendChild(btn);
        }

        function toggleNumber(num, btn) {
            if (marked_numbers.includes(num)) {
                marked_numbers = marked_numbers.filter(n => n !== num);
                btn.classList.remove('selected');
            } else {
                marked_numbers.push(num);
                btn.classList.add('selected');
            }
            
            if (marked_numbers.length > 0) {
                document.getElementById('selected-list').innerText = marked_numbers.sort((a,b) => a-b).join(', ');
            } else {
                document.getElementById('selected-list').innerText = "ምንም አልተመረጠም";
            }
        }

        // 🔴 ዋናው ማስተካከያ፡ መረጃውን ልኮ እንዲዘጋ የሚያደርገው ፈንክሽን
        function confirmTicket() {
            if (marked_numbers.length === 0) {
                alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
                return;
            }

            // መረጃውን በ ቴሌግራም ፎርማት ማዘጋጀት
            let webAppData = {
                "marked_numbers": marked_numbers
            };

            // 1. መረጃውን ወደ ፓይተን ቦቱ ይልካል
            tg.sendData(JSON.stringify(webAppData));
            // 2. ዌብ አፑን ይዘጋዋል
            tg.close();
        }
    </script>
</body>
</html>
