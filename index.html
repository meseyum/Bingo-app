<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Super Bingo Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {<audio id="win-sound" src="win.mp3" preload="auto"></audio>
<audio id="click-sound" src="click.mp3" preload="auto"></audio>
            background-color: #0b0920; 
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 12px;
            text-align: center;function executeSubmission() {
    // ቁልፉ ሲነካ የክሊክ ድምፅ ያጫውታል
    document.getElementById('click-sound').play(); 
    
    if (pickedNumbersList.length === 0) {
        alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
        return;
    }
    tg.sendData(JSON.stringify({ marked_numbers: pickedNumbersList }));
}

        }

        /* Dashboard Metrics Cards Row (Ref: Image 1000006680.jpg) */
        .metrics-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .metric-card {
            background-color: #16133a;
            border: 1px solid #231f5c;
            border-radius: 8px;
            padding: 10px 4px;
        }
        .metric-title {
            font-size: 10px;
            color: #7d79b0;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .metric-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffcc00;
        }

        .board-title {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
        }

        /* 1-100 Grid System Layout Matrix Container */
        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            max-width: 450px;
            margin: 0 auto;
            background-color: #060514;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #131035;
        }

        /* Standard Orange Grid Tiles */
        .tile-button {
            background-color: #d35400;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.1s, transform 0.1s;
        }
        .tile-button:active {
            transform: scale(0.9);
        }

        /* Selected Active Bright Yellow Grid Tile Layout */
        .tile-button.selected-active {
            background-color: #f1c40f !important;
            color: #000000 !important;
            box-shadow: 0 0 5px #f1c40f;
        }

        /* Selection Status Tracker Panel Label Box */
        .bottom-tracker-bar {
            background-color: #0f0d2c;
            border: 1px solid #1c184e;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            color: #f1c40f;
            font-weight: bold;
            max-width: 430px;
            margin: 20px auto 10px auto;
        }

        /* Main Confirm Button Layout Setup Grid Row */
        .action-dispatch-btn {
            background-color: #27ae60;
            color: #ffffff;
            font-size: 17px;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            border: none;
            width: 100%;
            max-width: 450px;
            margin: 10px auto;
            display: block;
            cursor: pointer;
        }
        .action-dispatch-btn:active {
            background-color: #219653;
        }
    </style>
</head>
<body>

    <div class="metrics-container">
        <div class="metric-card">
            <div class="metric-title">MAIN WALLET</div>
            <div class="metric-value" id="val-main">0 ብር</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">PLAYERS</div>
            <div class="metric-value">1</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">PLAY WALLET</div>
            <div class="metric-value">0 ብር</div>
        </div>
    </div>

    <div class="board-title">እባክዎ መጫወቻ ካርታ ይምረጡ (1-100)</div>

    <div class="grid-matrix" id="bingo-board-grid"></div>

    <div class="bottom-tracker-bar" id="selection-tracker-label">የመረጡት ካርታዎች: ምንም አልተመረጠም</div>

    <button class="action-dispatch-btn" onclick="executeSubmission()">ምርጫዬን አረጋግጣለሁ (Confirm Ticket)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let pickedNumbersList = [];
        const gridBox = document.getElementById('bingo-board-grid');
        const trackingLabel = document.getElementById('selection-tracker-label');

        // Parse query parameter to display dynamic wallet balance value automatically
        const urlParams = new URLSearchParams(window.location.search);
        const userBalanceParam = urlParams.get('balance') || '0';
        document.getElementById('val-main').innerText = `${userBalanceParam} ብር`;

        // Generate the 1-100 grid tiles layout programmatically
        for (let idx = 1; idx <= 100; idx++) {
            const blockTile = document.createElement('div');
            blockTile.className = 'tile-button';
            blockTile.innerText = idx;

            blockTile.addEventListener('click', () => {
                if (blockTile.classList.contains('selected-active')) {
                    blockTile.classList.remove('selected-active');
                    pickedNumbersList = pickedNumbersList.filter(v => v !== idx);
                } else {
                    blockTile.classList.add('selected-active');
                    pickedNumbersList.push(idx);
                }

                if (pickedNumbersList.length > 0) {
                    trackingLabel.innerText = `የመረጡት ካርታዎች: ${pickedNumbersList.sort((a,b)=>a-b).join(', ')}`;
                } else {
                    trackingLabel.innerText = "የመረጡት ካርታዎች: ምንም አልተመረጠም";
                }
            });

            gridBox.appendChild(blockTile);
        }

        function executeSubmission() {
            if (pickedNumbersList.length === 0) {
                alert("እባክዎ መጀመሪያ ቁጥር ይምረጡ!");
                return;
            }
            tg.sendData(JSON.stringify({ marked_numbers: pickedNumbersList }));
        }
    </script>
</body>
</html>
